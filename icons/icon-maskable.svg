    <circle cx="315" cy="315" r="9"/>
    <circle cx="255" cy="345" r="8"/>
    <circle cx="215" cy="370" r="9"/>
  </g>

  <circle cx="300" cy="260" r="24" fill="#FFC845"/>
  <circle cx="300" cy="260" r="9" fill="#0D47A1"/>
</svg>
