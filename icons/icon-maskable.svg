<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Proyecto Severo (maskable)</title>
  <desc>Versión maskable para PWAs: fondo completo y contenido dentro del área segura del 80%</desc>

  <rect width="512" height="512" fill="#0D47A1"/>

  <g stroke="#FFFFFF" stroke-width="2.2" opacity="0.32" fill="none" stroke-linecap="round">
    <line x1="185" y1="145" x2="260" y2="155"/>
    <line x1="260" y1="155" x2="200" y2="195"/>
    <line x1="200" y1="195" x2="285" y2="210"/>
    <line x1="285" y1="210" x2="220" y2="245"/>
    <line x1="220" y1="245" x2="300" y2="260"/>
    <line x1="300" y1="260" x2="230" y2="295"/>
