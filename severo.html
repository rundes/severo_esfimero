<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1565C0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" href="https://cpelectoral.org/wp-content/uploads/2024/09/escarapela-05-768x775.png">
  <link rel="apple-touch-icon" href="https://cpelectoral.org/wp-content/uploads/2024/09/escarapela-05-768x775.png">
  <title>Severo — Relevamientos</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
/* ── Variables ──────────────────────────────────────────────────────────────── */
:root {
  --primary:      #1565C0;
  --primary-dark: #0D47A1;
  --primary-light:#E3F2FD;
  --accent:       #00897B;
  --bg:           #F4F6F9;
  --surface:      #FFFFFF;
  --border:       #DDE1E7;
  --text:         #1A1A2E;
  --text-2:       #5C6677;
  --error:        #C62828;
  --success:      #2E7D32;
  --warn:         #E65100;
  --radius:       12px;
  --shadow:       0 2px 12px rgba(0,0,0,.08);
  --transition:   .18s ease;
}

/* ── Reset ──────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
}

.screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.screen-center {
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 32px;
}

/* ── Header ─────────────────────────────────────────────────────────────────── */
.app-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--primary);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 10;
  min-height: 56px;
}

.header-title {
  flex: 1;
  font-weight: 600;
  font-size: 1rem;
}

.header-count {
  font-size: .85rem;
  opacity: .8;
}

.btn-icon {
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  font-size: 1.1rem;
  padding: 6px;
  border-radius: 6px;
  min-width: 36px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-icon:hover { background: rgba(255,255,255,.15); }

/* ── Progress bar ───────────────────────────────────────────────────────────── */
.progress-bar {
  height: 4px;
  background: var(--border);
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  transition: width .3s ease;
}

/* ── Buttons ────────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: var(--radius);
  padding: 14px 24px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  min-height: 48px;
  text-decoration: none;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover { background: var(--primary-dark); }

.btn-outline {
  background: transparent;
  color: var(--primary);
  border: 2px solid var(--primary);
}
.btn-outline:hover { background: var(--primary-light); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
}
.btn-ghost:hover { background: var(--border); }

.btn-block { width: 100%; }

.btn-mock {
  background: var(--surface);
  color: var(--primary);
  border: 2px solid var(--border);
  width: 100%;
}
.btn-mock:hover { border-color: var(--primary); background: var(--primary-light); }

/* ── Auth screen ────────────────────────────────────────────────────────────── */
.screen-auth {
  background: var(--primary);
  justify-content: center;
  padding: 32px 24px;
  gap: 0;
}

.auth-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
  color: #fff;
}

.logo-mark {
  width: 72px;
  height: 72px;
  background: rgba(255,255,255,.2);
  border: 3px solid rgba(255,255,255,.5);
  border-radius: 20px;
  font-size: 2rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  margin-bottom: 16px;
}

.logo-img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  margin-bottom: 16px;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.25));
}

.logo-title {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -.5px;
}

.logo-sub {
  opacity: .8;
  margin-top: 4px;
}

.auth-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow);
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-2);
  font-size: .85rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Home screen ────────────────────────────────────────────────────────────── */
.home-user {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
}

.avatar-initials {
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: .95rem;
}

.user-name { font-weight: 600; }
.user-email { font-size: .85rem; color: var(--text-2); }

.home-actions {
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Geo screen ─────────────────────────────────────────────────────────────── */
.screen-geo {
  height: 100dvh;
  max-height: 100dvh;
  overflow: hidden;
}

.geo-status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: .88rem;
  color: var(--text-2);
  min-height: 40px;
}

.geo-spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

.geo-map {
  flex: 1;
  min-height: 0;
  z-index: 1;
}

.geo-footer {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.geo-coords {
  font-size: .8rem;
  color: var(--text-2);
  font-family: monospace;
  text-align: center;
  min-height: 1.2em;
}
.geo-barrio {
  font-size: .82rem;
  color: var(--text-2);
  text-align: center;
  margin: 0;
}
.geo-barrio strong { color: var(--primary); }
.barrio-tooltip {
  background: rgba(255,255,255,.92);
  border: none;
  border-radius: 4px;
  box-shadow: 0 1px 6px rgba(0,0,0,.18);
  font-size: .78rem;
  font-weight: 600;
  padding: 3px 8px;
  color: #1e293b;
}

.geo-search-row {
  display: flex;
  gap: 8px;
  padding: 8px 16px 0;
}
.geo-search-input {
  flex: 1;
  font-size: .85rem;
  padding: 6px 10px;
}
.geo-search-btn {
  flex-shrink: 0;
  font-size: .85rem;
  padding: 6px 12px;
}

.geo-actions {
  display: flex;
  gap: 10px;
}
.geo-actions .btn-primary { flex: 1; }

/* ── Type select ────────────────────────────────────────────────────────────── */
.type-loc {
  padding: 10px 16px;
  font-size: .85rem;
  color: var(--text-2);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.type-cards {
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.type-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: left;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.type-card:hover {
  border-color: var(--primary);
  background: var(--primary-light);
}
.type-card-icon { font-size: 2rem; }
.type-card-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
.type-card-desc  { font-size: .9rem; color: var(--text-2); line-height: 1.4; }

/* ── Block header ───────────────────────────────────────────────────────────── */
.block-header {
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  padding: 8px 16px;
  border-bottom: 1px solid #BBDEFB;
}

/* ── Survey screen ──────────────────────────────────────────────────────────── */
.survey-body {
  flex: 1;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
}

.question-label {
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1.4;
  display: block;
}

.required { color: var(--error); margin-left: 4px; }

.padron-badge {
  display: inline-block;
  margin-left: 8px;
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  color: var(--accent);
  background: #E0F2F1;
  border: 1px solid #80CBC4;
  border-radius: 4px;
  padding: 1px 6px;
  vertical-align: middle;
}

.question-hint {
  font-size: .85rem;
  color: var(--text-2);
  background: #FFF8E1;
  border-left: 3px solid #FFB300;
  padding: 8px 12px;
  border-radius: 0 6px 6px 0;
  line-height: 1.4;
}

.question-input { display: flex; flex-direction: column; gap: 8px; }

.input {
  width: 100%;
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 1rem;
  color: var(--text);
  background: var(--surface);
  transition: var(--transition);
  font-family: inherit;
}
.input:focus { outline: none; border-color: var(--primary); }

.textarea { resize: vertical; min-height: 96px; }

/* Scale */
.scale-row {
  display: flex;
  gap: 8px;
}
.scale-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 4px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  transition: var(--transition);
}
.scale-btn:hover   { border-color: var(--primary); background: var(--primary-light); }
.scale-btn.active  { border-color: var(--primary); background: var(--primary); color: #fff; }
.scale-num { font-size: 1.1rem; font-weight: 700; }
.scale-lbl { font-size: .6rem; text-align: center; line-height: 1.2; }

/* Chips */
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 8px 14px;
  border: 2px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  cursor: pointer;
  font-size: .9rem;
  transition: var(--transition);
  color: var(--text);
}
.chip:hover  { border-color: var(--primary); background: var(--primary-light); }
.chip.active { border-color: var(--primary); background: var(--primary); color: #fff; }

/* Radio */
.radio-group { display: flex; flex-direction: column; gap: 8px; }
.radio-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  transition: var(--transition);
  font-size: .95rem;
}
.radio-option input[type=radio] { margin-top: 2px; accent-color: var(--primary); }
.radio-option:hover  { border-color: var(--primary); background: var(--primary-light); }
.radio-option.active { border-color: var(--primary); background: var(--primary-light); }

.survey-footer {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  position: sticky;
  bottom: 0;
}
.survey-footer .btn-primary { flex: 1; }

/* ── Summary ────────────────────────────────────────────────────────────────── */
.summary-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.summary-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-size: .9rem;
  color: var(--text-2);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.loc-link { color: var(--primary); text-decoration: none; }
.loc-link:hover { text-decoration: underline; }

.summary-table { width: 100%; border-collapse: collapse; }
.summary-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
.summary-label { color: var(--text-2); font-size: .85rem; width: 40%; }
.summary-value { font-size: .95rem; font-weight: 500; }

/* ── Saving / Done ──────────────────────────────────────────────────────────── */
.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.done-icon   { font-size: 3.5rem; }
.done-sub    { color: var(--text-2); }
.done-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 16px; }

/* ── List ───────────────────────────────────────────────────────────────────── */
/* ── List filter bar ─────────────────────────────────────────────────────── */
.list-filter-bar {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.list-filter-bar::-webkit-scrollbar { display: none; }

.filter-tab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  transition: var(--transition);
  flex-shrink: 0;
}
.filter-tab:hover { border-color: var(--primary); color: var(--primary); }
.filter-tab.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.filter-tab-count {
  background: rgba(255,255,255,.3);
  border-radius: 10px;
  padding: 1px 6px;
  font-size: .72rem;
  font-weight: 700;
}
.filter-tab:not(.active) .filter-tab-count {
  background: var(--border);
  color: var(--text-2);
}

/* ── Survey list ─────────────────────────────────────────────────────────── */
.list-body {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  flex: 1;
}

.list-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 48px 16px;
  color: var(--text-2);
  font-size: .9rem;
}
.list-spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

.survey-card {
  display: flex;
  align-items: stretch;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
}
.survey-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
.survey-card:active { opacity: .85; }

.card-accent {
  width: 4px;
  flex-shrink: 0;
  background: var(--border);
}
.survey-card--ciudadano        .card-accent { background: #3b82f6; }
.survey-card--problematica     .card-accent { background: #f59e0b; }
.survey-card--sociohabitacional .card-accent { background: #10b981; }

.card-body  { flex: 1; min-width: 0; padding: 12px 10px 12px 14px; }

.card-top-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.card-type-label {
  font-size: .75rem;
  font-weight: 700;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: .4px;
}
.card-barrio {
  font-size: .72rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1px 7px;
  color: var(--text-2);
}
.card-title {
  font-size: .97rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.card-subtitle {
  font-size: .82rem;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 5px;
}
.card-bottom-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.card-date { font-size: .76rem; color: var(--text-2); }
.card-loc  { font-size: .72rem; color: var(--text-2); font-family: monospace; }

.card-arrow {
  display: flex;
  align-items: center;
  padding: 0 12px 0 6px;
  font-size: 1.3rem;
  color: var(--border);
  flex-shrink: 0;
  transition: var(--transition);
}
.survey-card:hover .card-arrow { color: var(--primary); }

/* ── Toast ──────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: .9rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s, transform .2s;
  white-space: nowrap;
  z-index: 100;
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Utilities ──────────────────────────────────────────────────────────────── */
.hint {
  font-size: .82rem;
  color: var(--text-2);
  text-align: center;
  padding: 8px 16px;
}
.center { text-align: center; }
.loading-init {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  color: var(--text-2);
}

/* ── Citizen Search ──────────────────────────────────────────────────────────── */
.search-group { display: flex; flex-direction: column; gap: 8px; }

.search-divider {
  text-align: center;
  font-size: .82rem;
  color: var(--text-2);
  padding: 2px 0;
}

.search-status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 20px 16px;
  color: var(--text-2);
  font-size: .9rem;
}
.search-error { color: #c0392b; font-size: .82rem; text-align: center; }

.citizen-results { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

.citizen-result {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: var(--transition);
}
.citizen-result:hover { border-color: var(--primary); background: var(--primary-light); }

.citizen-result-name { font-weight: 700; font-size: 1rem; color: var(--text); }
.citizen-result-info { font-size: .82rem; color: var(--text-2); margin-top: 3px; }

.google-login-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 44px;
  justify-content: center;
}

.google-not-configured {
  font-size: .78rem;
  color: var(--warn);
  text-align: center;
  padding: 4px 0 0;
}

.btn-google {
  background: #fff;
  border: 1px solid #dadce0;
  color: #3c4043;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  font-size: .95rem;
  font-weight: 500;
  border-radius: 4px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.btn-google:hover { background: #f8f9fa; border-color: #c6c6c6; }

/* ── Home padron search ──────────────────────────────────────────────────────── */
.home-search-section {
  padding: 0 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.home-search-label {
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  font-weight: 700;
  color: var(--text-2);
  padding-top: 4px;
}

/* ── Padron detail screen ────────────────────────────────────────────────────── */
.padron-detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 80px;
}

.padron-detail-hero {
  padding: 20px 0 16px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
}

.padron-detail-name {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}

.padron-detail-sub {
  font-size: .88rem;
  color: var(--text-2);
  margin-top: 4px;
}

.padron-section {
  margin-bottom: 20px;
}

.padron-section-title {
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 2px solid var(--primary-light);
}

.padron-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.padron-key {
  font-size: .8rem;
  color: var(--text-2);
  flex-shrink: 0;
  min-width: 120px;
}

.padron-val {
  font-size: .85rem;
  color: var(--text);
  font-weight: 500;
  text-align: right;
  flex: 1;
}

.padron-actions {
  padding: 12px 0 8px;
}

/* ── Familia group ───────────────────────────────────────────────────────────── */
.familia-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 10px;
}

.familia-member {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  gap: 8px;
}

.familia-member-info { flex: 1; min-width: 0; }

.familia-member-name {
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.familia-member-sub {
  font-size: .76rem;
  color: var(--text-2);
  margin-top: 2px;
}

.btn-remove {
  background: none;
  border: none;
  color: var(--error);
  cursor: pointer;
  font-size: 1rem;
  padding: 4px 6px;
  border-radius: 6px;
  flex-shrink: 0;
  min-width: auto;
  min-height: auto;
  line-height: 1;
}
.btn-remove:hover { background: #FFEBEE; }

.familia-add-row { margin-top: 8px; }

.familia-search-results {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.familia-search-result {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  gap: 8px;
}

.familia-add-btn {
  flex-shrink: 0;
  font-size: .8rem;
  padding: 6px 10px;
  min-height: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  white-space: nowrap;
}

/* ── Electoral participation grid ───────────────────────────────────────────── */
.elec-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}

.elec-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 8px;
  flex: 1;
  min-width: 72px;
  max-width: 90px;
}

.elec-label {
  font-size: .62rem;
  color: var(--text-2);
  text-align: center;
  line-height: 1.2;
}

.elec-value {
  font-size: .72rem;
  font-weight: 700;
  margin-top: 4px;
  text-align: center;
  line-height: 1.2;
}

.elec-voted  { color: var(--success); }
.elec-absent { color: var(--error); }
.elec-neutral { color: var(--text-2); }

/* ── Photo input ─────────────────────────────────────────────────────────────── */
.photo-wrap { display: flex; flex-direction: column; gap: 10px; }
.photo-preview { width: 100%; max-height: 260px; object-fit: cover; border-radius: var(--radius); border: 2px solid var(--border); display: block; }
.photo-empty { width: 100%; height: 120px; border: 2px dashed var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: var(--text-2); font-size: .9rem; background: var(--bg); }
.photo-btn { cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
.photo-status { display: flex; align-items: center; gap: 8px; font-size: .82rem; min-height: 20px; }
.photo-ok   { color: var(--success); font-weight: 600; }
.photo-warn { color: var(--warn); }

/* ── Summary / detail photo ──────────────────────────────────────────────────── */
.summary-photo { width: 100%; max-height: 220px; object-fit: cover; border-radius: var(--radius); display: block; }
.detail-photo { width: 100%; max-height: 240px; object-fit: cover; border-radius: var(--radius); display: block; cursor: zoom-in; transition: max-height .3s ease; }
.detail-photo.detail-photo-expand { max-height: 80vh; cursor: zoom-out; }
.detail-photo-fallback { padding: .75rem; background: var(--surface); border-radius: var(--radius); text-align: center; font-size: .875rem; }
.detail-photo-fallback a { color: var(--primary); font-weight: 600; text-decoration: none; }

/* ── Estado badge ────────────────────────────────────────────────────────────── */
.estado-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: .72rem; font-weight: 700; letter-spacing: .3px; vertical-align: middle; flex-shrink: 0; }
.estado-pendiente { background: #F3F4F6; color: var(--text-2); border: 1px solid var(--border); }
.estado-persiste  { background: #FFF3E0; color: var(--warn);   border: 1px solid #FFCC80; }
.estado-resuelto  { background: #E8F5E9; color: var(--success); border: 1px solid #A5D6A7; }

/* ── Estado actions ──────────────────────────────────────────────────────────── */
.estado-section { padding: 16px 0 4px; border-top: 1px solid var(--border); margin-top: 8px; }
.estado-section-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; color: var(--text-2); margin-bottom: 10px; }
.estado-actions { display: flex; gap: 10px; }
.btn-estado { flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text-2); font-size: .9rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
.btn-estado:hover { border-color: var(--warn); color: var(--warn); background: #FFF8F0; }
.btn-estado-ok:hover { border-color: var(--success); color: var(--success); background: #F1F8F1; }
.btn-estado-active { border-color: var(--warn); color: var(--warn); background: #FFF3E0; }
.btn-estado-ok.btn-estado-active { border-color: var(--success); color: var(--success); background: #E8F5E9; }

const Geo = {
  async getLocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('El navegador no soporta geolocalización'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: Math.round(pos.coords.accuracy),
        }),
        (err) => {
          const msgs = {
            1: 'Permiso de ubicación denegado',
            2: 'Ubicación no disponible',
            3: 'Tiempo de espera agotado',
          };
          reject(new Error(msgs[err.code] || 'Error al obtener ubicación'));
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
      );
    });
  },

  format(location) {
    if (!location) return 'Sin ubicación';
    return `${location.lat.toFixed(6)}, ${location.lng.toFixed(6)} (±${location.accuracy}m)`;
  },

  mapsUrl(location) {
    if (!location) return null;
    return `https://www.google.com/maps?q=${location.lat},${location.lng}`;
  },

  async reverseGeocode(lat, lng) {
    if (CONFIG.GOOGLE_API_KEY) {
      try {
        const res = await fetch(
          `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${CONFIG.GOOGLE_API_KEY}&language=es&result_type=street_address`
        );
        if (res.ok) {
          const data = await res.json();
          if (data.status === 'OK' && data.results?.[0]) return data.results[0].formatted_address;
        }
      } catch {}
    }
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=es`,
        { headers: { 'User-Agent': 'SeveroMaipu/1.0' } }
      );
      if (res.ok) {
        const data = await res.json();
        if (data?.display_name) return data.display_name;
      }
    } catch {}
    return null;
  },

  async geocode(query) {
    if (!query) return null;
    if (CONFIG.GOOGLE_API_KEY) {
      try {
        const res = await fetch(
          `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=${CONFIG.GOOGLE_API_KEY}&language=es&region=ar`
        );
        if (res.ok) {
          const data = await res.json();
          if (data.status === 'OK' && data.results?.[0]) {
            const r = data.results[0];
            return { lat: r.geometry.location.lat, lng: r.geometry.location.lng, address: r.formatted_address };
          }
        }
      } catch {}
    }
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=ar&accept-language=es`,
        { headers: { 'User-Agent': 'SeveroMaipu/1.0' } }
      );
      if (res.ok) {
        const data = await res.json();
        if (data?.[0]) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), address: data[0].display_name };
      }
    } catch {}
    return null;
  },
};

// ── Google Cloud Storage ─────────────────────────────────────────────────────
const GCS = {
  async compress(file, maxPx = 1200, quality = 0.78) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const ratio = Math.min(maxPx / Math.max(img.width, img.height), 1);
          const canvas = document.createElement('canvas');
          canvas.width  = Math.round(img.width  * ratio);
          canvas.height = Math.round(img.height * ratio);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(resolve, 'image/jpeg', quality);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  },

  async upload(blob, filename) {
    const token = localStorage.getItem('severo_access_token');
    if (!token) throw new Error('401');
    const bucket = (typeof CONFIG !== 'undefined' && CONFIG.GCS_BUCKET) || 'maipu-pba';
    const url = `https://storage.googleapis.com/upload/storage/v1/b/${encodeURIComponent(bucket)}/o?uploadType=media&name=${encodeURIComponent(filename)}`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
      body: blob,
    });
    if (res.status === 401) throw new Error('401');
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(`GCS ${res.status}: ${body.error?.message || 'Error al subir la foto'}`);
    }
    // Los slashes del nombre deben quedar sin codificar en la URL pública
    const publicName = filename.split('/').map(encodeURIComponent).join('/');
    return `https://storage.googleapis.com/${bucket}/${publicName}`;
  },

  filename(prefix = 'fotos') {
    const ts  = Date.now();
    const rnd = Math.random().toString(36).slice(2, 8);
    return `${prefix}/${ts}-${rnd}.jpg`;
  },
};

  <script>
const SheetsDB = {
  _hasToken() {
    return !!localStorage.getItem('severo_access_token');
  },

  async save(type, record) {
    if (!this._hasToken()) return this._mockSave(type, record);
    return this._apiAppend(type, record);
  },

  getAll(type) {
    return this._mockGetAll(type);
  },

  async getAllAsync(type) {
    if (!this._hasToken()) return this._mockGetAll(type);
    return this._apiGetAll(type);
  },

  async update(type, id, updates) {
    this._mockUpdate(type, id, updates);
    if (this._hasToken()) return this._apiUpdate(type, id, updates);
  },

  // ── Mock (localStorage) ──────────────────────────────────────────────────

  _mockSave(type, record) {
    const key = `severo_${type}`;
    const items = JSON.parse(localStorage.getItem(key) || '[]');
    const saved = { ...record, id: Date.now(), savedAt: new Date().toISOString() };
    items.unshift(saved);
    localStorage.setItem(key, JSON.stringify(items));
    return saved;
  },

  _mockGetAll(type) {
    const key = `severo_${type}`;
    return JSON.parse(localStorage.getItem(key) || '[]');
  },

  _mockUpdate(type, id, updates) {
    const key = `severo_${type}`;
    const items = JSON.parse(localStorage.getItem(key) || '[]');
    const idx = items.findIndex((i) => String(i.id) === String(id));
    if (idx >= 0) {
      items[idx] = { ...items[idx], ...updates, updatedAt: new Date().toISOString() };
      localStorage.setItem(key, JSON.stringify(items));
    }
  },

  // ── Google Sheets API ────────────────────────────────────────────────────

  _sheetForType(type) {
    if (type === 'ciudadano')        return CONFIG.SHEET_CIUDADANOS;
    if (type === 'sociohabitacional') return CONFIG.SHEET_SOCIOHABITACIONAL;
    return CONFIG.SHEET_PROBLEMATICAS;
  },

  async _apiAppend(type, record) {
    const sheet = this._sheetForType(type);
    const token = this._getToken();
    const row = this._toRow(type, record);

    console.log('[SheetsDB] guardando en pestaña:', sheet);
    console.log('[SheetsDB] fila:', row);

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${encodeURIComponent(sheet)}!A1:append?valueInputOption=USER_ENTERED`;

    const doAppend = () => fetch(url, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [row] }),
    });

    let res = await doAppend();
    console.log('[SheetsDB] append status:', res.status);

    if (res.status === 400 || res.status === 404) {
      console.log('[SheetsDB] pestaña no encontrada, creando:', sheet);
      const createRes = await this._createSheet(CONFIG.SURVEY_SPREADSHEET_ID, sheet, token);
      console.log('[SheetsDB] createSheet status:', createRes.status);
      await new Promise((r) => setTimeout(r, 800));
      await this._writeHeaders(type, CONFIG.SURVEY_SPREADSHEET_ID, sheet, token);
      res = await doAppend();
      console.log('[SheetsDB] retry status:', res.status);
    }

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      console.error('[SheetsDB] error body:', errBody);
      throw new Error(`Sheets API ${res.status}: ${errBody.error?.message || JSON.stringify(errBody)}`);
    }
    return record;
  },

  async _createSheet(spreadsheetId, sheetName, token) {
    return fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`,
      {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{ addSheet: { properties: { title: sheetName } } }],
        }),
      }
    );
  },

  _toHeaders(type) {
    const base = ['ID', 'Fecha', 'Email operador', 'Nombre operador', 'Latitud', 'Longitud', 'Precisión (m)'];
    if (type === 'ciudadano') {
      return [...base, 'DNI', 'Apellido y nombre', 'Apodo', 'Domicilio', 'Barrio', 'Edad', 'Residencia',
        'Calidad de vida', 'Problemas', 'Mejoras', 'Comentarios'];
    }
    if (type === 'sociohabitacional') {
      return [...base, 'DNI', 'Apellido y nombre', 'Apodo', 'Domicilio', 'Barrio',
        'Personas total', 'Menores de 18', 'Mayores de 65', 'Familias', 'Tenencia',
        'Escritura', 'Cuotas adeudadas', 'Tipo vivienda', 'Material paredes', 'Ambientes dormir',
        'Desagüe', 'Agua potable', 'Electricidad', 'Gas', 'Discapacidad', 'Tipo discapacidad',
        'CUD', 'Actividades menores', 'Actividades adultos', 'Actividades mayores',
        'Mejora barrio', 'Mejora municipio', 'Falta Maipú', 'Voto',
        'Vivienda terminada', 'Participa menores', 'Participa adultos', 'Participa mayores'];
    }
    return [...base, 'Categoría', 'Dirección', 'Barrio', 'Descripción', 'Urgencia', 'Afecta tránsito', 'Observaciones', 'Foto URL', 'Estado'];
  },

  async _writeHeaders(type, spreadsheetId, sheet, token) {
    const headers = this._toHeaders(type);
    return fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheet)}!A1?valueInputOption=USER_ENTERED`,
      {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [headers] }),
      }
    );
  },

  async _apiGetAll(type) {
    const sheet = this._sheetForType(type);
    const token = this._getToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${encodeURIComponent(sheet)}`;
    console.log('[SheetsDB] getAllAsync:', sheet);
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    console.log('[SheetsDB] getAllAsync status:', res.status, sheet);
    if (res.status === 400 || res.status === 404) return []; // pestaña aún no creada
    if (!res.ok) throw new Error(`Sheets API error ${res.status} al leer ${sheet}`);
    const data = await res.json();
    return this._fromRows(type, data.values || []);
  },

  _getToken() {
    const t = localStorage.getItem('severo_access_token');
    if (!t) throw new Error('Sin token de acceso. Reautenticar con scope de Sheets.');
    return t;
  },

  _sc(v) {
    const s = String(v ?? '');
    return /^[=+\-@|]/.test(s) ? "'" + s : s;
  },

  _toRow(type, r) {
    const sc = (v) => this._sc(v);
    const base = [
      r.id || '',
      r.savedAt || new Date().toISOString(),
      r.operador?.email || '',
      r.operador?.name || '',
      r.location?.lat || '',
      r.location?.lng || '',
      r.location?.accuracy || '',
    ];
    if (type === 'ciudadano') {
      const a = r.answers || {};
      return [...base, a.dni || '', sc(a.apellido), sc(a.apodo), sc(a.domicilio), a.barrio || '',
        a.edad || '', a.residencia || '', a.calidad_vida || '',
        (a.problemas || []).join(', '), sc(a.mejoras), sc(a.comentarios)];
    }
    if (type === 'sociohabitacional') {
      const a = r.answers || {};
      return [...base, a.dni || '', sc(a.apellido), sc(a.apodo), sc(a.domicilio),
        a.barrio || '', a.personas_total || '', a.personas_menores || '',
        a.personas_mayores65 || '', a.familias || '', a.tenencia || '',
        a.escritura || '', a.cuotas_adeuda || '', a.tipo_vivienda || '',
        a.material_paredes || '', a.ambientes_dormir || '', a.desague || '',
        a.agua_potable || '', a.electricidad || '', a.gas || '',
        a.discapacidad || '', (a.tipo_discapacidad || []).join(', '), a.cud || '',
        (a.actividades_menores || []).join(', '), (a.actividades_adultos || []).join(', '),
        (a.actividades_mayores || []).join(', '), sc(a.mejora_barrio),
        sc(a.mejora_municipio), sc(a.falta_maipu), a.voto || '',
        a.vivienda_estado || '', a.participa_menores || '', a.participa_adultos || '', a.participa_mayores || ''];
    }
    const a = r.answers || {};
    return [...base, a.categoria || '', sc(a.direccion), a.barrio || '', sc(a.descripcion),
      a.urgencia || '', a.afecta_transito || '', sc(a.observaciones),
      sc(a.foto_url || ''), sc(r.estado || '')];
  },

  _fromRows(type, rows) {
    return rows.slice(1).filter(row => row.length > 0).map((row) => {
      const base = { id: row[0], savedAt: row[1], operador: { email: row[2], name: row[3] },
        location: { lat: parseFloat(row[4]), lng: parseFloat(row[5]), accuracy: parseInt(row[6]) } };
      if (type === 'ciudadano') {
        return { ...base, answers: { dni: row[7], apellido: row[8], apodo: row[9],
          domicilio: row[10], barrio: row[11], edad: row[12], residencia: row[13],
          calidad_vida: row[14], problemas: row[15] ? row[15].split(', ') : [],
          mejoras: row[16], comentarios: row[17] } };
      }
      if (type === 'sociohabitacional') {
        return { ...base, answers: { dni: row[7], apellido: row[8], apodo: row[9],
          domicilio: row[10], barrio: row[11], personas_total: row[12],
          personas_menores: row[13], personas_mayores65: row[14], familias: row[15],
          tenencia: row[16], escritura: row[17], cuotas_adeuda: row[18],
          tipo_vivienda: row[19], material_paredes: row[20], ambientes_dormir: row[21],
          desague: row[22], agua_potable: row[23], electricidad: row[24], gas: row[25],
          discapacidad: row[26], tipo_discapacidad: row[27] ? row[27].split(', ') : [],
          cud: row[28], actividades_menores: row[29] ? row[29].split(', ') : [],
          actividades_adultos: row[30] ? row[30].split(', ') : [],
          actividades_mayores: row[31] ? row[31].split(', ') : [],
          mejora_barrio: row[32], mejora_municipio: row[33], falta_maipu: row[34],
          voto: row[35], vivienda_estado: row[36] || '',
          participa_menores: row[37] || '', participa_adultos: row[38] || '', participa_mayores: row[39] || '' } };
      }
      return { ...base, answers: { categoria: row[7], direccion: row[8], barrio: row[9],
        descripcion: row[10], urgencia: row[11], afecta_transito: row[12], observaciones: row[13],
        foto_url: (row[14] || '').replace(/%2F/gi, '/') }, estado: row[15] || '' };
    });
  },

  async _apiUpdate(type, id, updates) {
    const sheet = this._sheetForType(type);
    const token = this._getToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${encodeURIComponent(sheet)}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) return;
    const rows = (await res.json()).values || [];
    const rowIdx = rows.findIndex((r, i) => i > 0 && String(r[0]).trim() === String(id).trim());
    if (rowIdx < 0) return;
    const sheetRow = rowIdx + 1;
    if (type === 'problematica' && updates.estado !== undefined) {
      const range = `${encodeURIComponent(sheet)}!P${sheetRow}`;
      await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`,
        {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ values: [[updates.estado]] }),
        }
      );
    }
  },
};

// ── Padrón electoral ─────────────────────────────────────────────────────────
// LECTURA: API Key de Google (no requiere token del relevador)
// ESCRITURA (lat/lng/domicilio real): token OAuth del relevador
//
// "Padron integrado" — ver CONFIG para mapa completo de columnas

const Padron = {
  _cache: {},

  _hasApiKey() { return !!CONFIG.GOOGLE_API_KEY; },

  _apiKeyParam() { return CONFIG.GOOGLE_API_KEY ? `?key=${CONFIG.GOOGLE_API_KEY}` : ''; },

  searchByDNI(dni) { return this._mockSearch(dni); },

  async searchByDNIAsync(dni) {
    if (!this._hasApiKey()) return this._mockSearch(dni);
    return this._apiSearch(dni);
  },

  async searchByApellidoAsync(query) {
    if (!this._hasApiKey()) return this._mockSearchByApellido(query);
    return this._apiSearchByApellido(query);
  },

  async updateLatLng(meta, lat, lng, domicilioReal) {
    if (!meta?.coordRange) return;
    const token = localStorage.getItem('severo_access_token');
    if (!token) return this._mockUpdateLatLng(meta, lat, lng);
    return this._apiUpdateLatLng(meta, lat, lng, domicilioReal);
  },

  async upsertByDNI(record) { return this._mockUpsert(record); },

  _titleCase(str) {
    if (!str) return '';
    return String(str).toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
  },

  // ── Mock ──────────────────────────────────────────────────────────────────

  _mockSearch(dni) {
    if (!dni) return null;
    const dniStr = String(dni).trim();
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    const found = items.find((r) => r.dni === dniStr);
    if (!found) return null;
    return { ...found, _meta: { dni: dniStr } };
  },

  _mockSearchByApellido(query) {
    if (!query || query.length < 4) return [];
    const q = query.toLowerCase();
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    return items
      .filter((r) => (r.apellido || '').toLowerCase().includes(q))
      .slice(0, 15)
      .map((r) => ({ ...r, _meta: { dni: r.dni } }));
  },

  _mockUpsert(record) {
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    const idx = items.findIndex((r) => r.dni === String(record.dni).trim());
    const updated = { ...record, updatedAt: new Date().toISOString() };
    if (idx >= 0) items[idx] = { ...items[idx], ...updated };
    else items.push(updated);
    localStorage.setItem('severo_padron', JSON.stringify(items));
    return updated;
  },

  _mockUpdateLatLng(meta, lat, lng) {
    if (!meta?.dni) return;
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    const idx = items.findIndex((r) => r.dni === meta.dni);
    if (idx >= 0) {
      items[idx] = { ...items[idx], lat, lng, updatedAt: new Date().toISOString() };
      localStorage.setItem('severo_padron', JSON.stringify(items));
    }
  },

  // ── API ───────────────────────────────────────────────────────────────────

  async _fetchSheet(sheetName) {
    if (this._cache[sheetName]) return this._cache[sheetName];
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(sheetName)}${this._apiKeyParam()}`;
    console.log('[Padron] GET', sheetName, url.replace(/key=[^&]+/, 'key=…'));
    const res = await fetch(url);
    console.log('[Padron] status', res.status, sheetName);
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(`Padrón API ${res.status}: ${body.error?.message || sheetName}`);
    }
    const rows = (await res.json()).values || [];
    this._cache[sheetName] = rows;
    return rows;
  },

  _rowToPadronRecord(row, rowIdx) {
    // A=DNI(0)  B=SEXO(1)  C=TIPO(2)
    // D–L = participación electoral (3–11)
    // M=TIPO_DNI(12)  N=APELLIDO Y NOMBRE(13)  O=CLASE(14)  P=DOMICILIO(15)
    // Q=LATITUD(16)   R=LONGITUD(17)            S=DOMICILIO REAL(18)
    // T=PROFESION(19) U=CIRCUITO(20)  V=NRO_MESA(21)  W=ORDEN(22)  X=ESTABLECIMIENTO(23)
    // Y=ocupacion(24) Z=nivel_educativo(25)
    // AA=ESTADO CIVIL(26)  AB=AFILIACION(27)  AC=LOCALIDAD(28)
    // AD=EMPLEADOR1(29)  AE=EMPLEADOR2(30)  AF=EMPLEADOR3(31)
    // AG=REGIMEN_IMP(32)  AH=CELULAR1(33)  AI=CELULAR2(34)
    // AJ=EMAIL1(35)  AK=EMAIL2(36)  AL=AUH(37)  AM=IFE(38)  AN=TWITTER(39)
    return {
      dni:            String(row[0]  || '').trim(),

    // fila 0 = encabezados; A=col 0 = DNI
    const i = rows.findIndex((r, idx) => idx > 0 && String(r[0] || '').trim() === dniStr);

    // fila 0 = encabezados; N=col 13 = APELLIDO Y NOMBRE
    rows.slice(1).forEach((row, i) => {

    const range  = useFullRange ? meta.coordRangeFull : meta.coordRange;
    const values = useFullRange ? [[lat, lng, domicilioReal]] : [[lat, lng]];

    await fetch(

        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values }),
      }
    );
  },

// ── Mapa Leaflet (instancias globales) ───────────────────────────────────────

let _map = null;
let _marker = null;
let _searchDebounce = null;
let _geocodeDebounce = null;
let _homeSearchDebounce = null;
let _familiaSearchDebounce = null;
let _tokenClient = null;
let _silentRefreshResolve = null;
let _silentRefreshReject   = null;
let _listFilter = 'todos';
let _photoBlobs  = {};

function initGoogleTokenClient() {
  if (!window.google?.accounts?.oauth2) return;
  const id = CONFIG.GOOGLE_CLIENT_ID;
  if (!id || id === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') return;

  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: id,
    scope: 'openid email profile https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/devstorage.read_write',
    callback: async (tokenResponse) => {
      if (_silentRefreshResolve) {
        const resolve = _silentRefreshResolve;
        const reject  = _silentRefreshReject;
        _silentRefreshResolve = null;
        _silentRefreshReject  = null;
        if (tokenResponse.error) return reject(new Error(tokenResponse.error));
        localStorage.setItem('severo_access_token', tokenResponse.access_token);
        return resolve(tokenResponse.access_token);
      }
      if (tokenResponse.error) return;
      try {
        const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
          { headers: { Authorization: `Bearer ${tokenResponse.access_token}` } });
        if (res.ok) {
          const info = await res.json();
          const user = Auth.handleGoogleToken(tokenResponse.access_token, info);
          go('home', { user });
        }
      } catch (e) {
        console.error('Error al obtener datos del usuario:', e);
      }
    },
  });
}

function googleLogin() {
  if (_tokenClient) _tokenClient.requestAccessToken({ prompt: '' });
}

function ensureFreshToken() {
  return new Promise((resolve, reject) => {
    if (!_tokenClient) return reject(new Error('Cliente OAuth no disponible'));
    _silentRefreshResolve = resolve;
    _silentRefreshReject  = reject;
    _tokenClient.requestAccessToken({ prompt: '' });
    setTimeout(() => {
      if (_silentRefreshResolve) {
        _silentRefreshResolve = null;
        _silentRefreshReject  = null;
        reject(new Error('Timeout al renovar sesión — volvé a ingresar'));
      }
    }, 15000);
  });
}

window.addEventListener('load', () => { if (!_tokenClient) initGoogleTokenClient(); });

function esc(v) {
  return String(v ?? '')

}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit' });

// ── Helpers de visibilidad condicional ───────────────────────────────────────

function isVisible(q) {
  return !q.showIf || q.showIf(State.answers);
}

function nextVisibleIdx(from, questions) {
  let idx = from + 1;
  while (idx < questions.length && !isVisible(questions[idx])) idx++;
  return idx;
}

function prevVisibleIdx(from, questions) {
  let idx = from - 1;
  while (idx >= 0 && !isVisible(questions[idx])) idx--;
  return idx;
}

function visibleQuestions(questions) {
  return questions.filter(isVisible);
}

function visiblePosition(questions, currentIdx) {
  return questions.slice(0, currentIdx + 1).filter(isVisible).length;
}

// ── Home padron search ───────────────────────────────────────────────────────

function onHomeSearchInput(value) {
  State.homeSearchQuery = value;
  clearTimeout(_homeSearchDebounce);
  const isNumeric = /^\d+$/.test(value.trim());
  const minLen = isNumeric ? 6 : 4;
  if (value.length >= minLen) {
    State.homeSearching = true;
    State.homeSearchResults = [];
    State.homeSearchError = null;
    updateHomeSearchUI();
    _homeSearchDebounce = setTimeout(() => doHomeSearch(value, isNumeric), 450);
  } else {
    State.homeSearchResults = [];
    State.homeSearching = false;
    State.homeSearchError = null;
    updateHomeSearchUI();
  }
}

function updateHomeSearchUI() {
  const el = document.getElementById('homeSearchResults');
  if (el) el.innerHTML = renderHomeSearchResults();
}

async function doHomeSearch(value, isNumeric) {
  try {
    let results;
    if (isNumeric) {
      const record = await Padron.searchByDNIAsync(value);
      results = record ? [record] : [];
    } else {
      results = await Padron.searchByApellidoAsync(value);
    }
    State.homeSearchResults = results || [];
    State.homeSearchError = null;
    State.homeSearching = false;
  } catch (err) {
    console.error('[homeSearch] error:', err);
    State.homeSearchError = err.message;
    State.homeSearchResults = [];
    State.homeSearching = false;
  }
  updateHomeSearchUI();
}

function renderHomeSearchResults() {
  if (State.homeSearching) {
    return `<div class="search-status"><div class="geo-spinner"></div> Buscando en el padrón…</div>`;
  }
  if (State.homeSearchError) {
    return `<div class="search-status search-error">⚠ ${esc(State.homeSearchError)}</div>`;
  }
  const results = State.homeSearchResults || [];
  if (!results.length) {
    const hasQuery = (State.homeSearchQuery?.length >= 4);
    return hasQuery ? `<div class="search-status">Sin resultados en el padrón</div>` : '';
  }
  return `<div class="citizen-results">
    ${results.map((r, i) => `
      <div class="citizen-result" onclick="openPadronDetail(${i})">
        <div class="citizen-result-name">${esc(r.apellido) || '—'}</div>
        <div class="citizen-result-info">DNI ${esc(r.dni)} · ${esc(r.domicilio) || 'Sin domicilio'}</div>
      </div>`).join('')}
  </div>`;
}

function openPadronDetail(idx) {
  const record = (State.homeSearchResults || [])[idx];
  if (record) {
    go('padronDetail', { padronDetailRecord: record,
      familiaSearchQuery: '', familiaSearchResults: [], familiaSearching: false });
  }
}

function addFamiliaMember(idx) {
  const member = (State.familiaSearchResults || [])[idx];
  const r = State.padronDetailRecord;
  if (!member || !r?.dni) return;
  const group = getFamiliaGroup(r.dni);
  if (!group.find((m) => m.dni === member.dni)) {
    group.push({ dni: member.dni, apellido: member.apellido, domicilio: member.domicilio });
    saveFamiliaGroup(r.dni, group);
    const reverseGroup = getFamiliaGroup(member.dni);
    if (!reverseGroup.find((m) => m.dni === r.dni)) {
      reverseGroup.push({ dni: r.dni, apellido: r.apellido, domicilio: r.domicilio });
      saveFamiliaGroup(member.dni, reverseGroup);
    }
  }
  State.familiaSearchResults = [];
  State.familiaSearchQuery = '';
  const input = document.getElementById('familiaSearchInput');
  if (input) input.value = '';
  const el = document.getElementById('familiaSection');
  if (el) el.innerHTML = renderFamiliaSection();
}

function removeFamiliaMember(mainDni, idx) {
  const group = getFamiliaGroup(mainDni);
  const removed = group[idx];
  group.splice(idx, 1);
  saveFamiliaGroup(mainDni, group);
  if (removed) {
    const rev = getFamiliaGroup(removed.dni).filter((m) => m.dni !== mainDni);
    saveFamiliaGroup(removed.dni, rev);
  }
  const el = document.getElementById('familiaSection');
  if (el) el.innerHTML = renderFamiliaSection();
}

function renderFamiliaSection() {

function onFamiliaSearchInput(value) {
  State.familiaSearchQuery = value;
  clearTimeout(_familiaSearchDebounce);
  const isNumeric = /^\d+$/.test(value.trim());
  const minLen = isNumeric ? 6 : 4;
  if (value.length >= minLen) {
    State.familiaSearching = true;
    State.familiaSearchResults = [];
    const el = document.getElementById('familiaSearchResults');
    if (el) el.innerHTML = `<div class="search-status"><div class="geo-spinner"></div> Buscando…</div>`;
    _familiaSearchDebounce = setTimeout(() => doFamiliaSearch(value, isNumeric), 450);
  } else {
    State.familiaSearchResults = [];
    State.familiaSearching = false;
    const el = document.getElementById('familiaSearchResults');
    if (el) el.innerHTML = '';
  }
}

async function doFamiliaSearch(value, isNumeric) {
  try {
    let results;
    if (isNumeric) {
      const record = await Padron.searchByDNIAsync(value);
      results = record ? [record] : [];
    } else {
      results = await Padron.searchByApellidoAsync(value);
    }
    const mainDni = State.padronDetailRecord?.dni;
    const existingDnis = new Set([mainDni, ...getFamiliaGroup(mainDni).map((m) => m.dni)]);
    State.familiaSearchResults = (results || []).filter((r) => !existingDnis.has(r.dni));
    State.familiaSearching = false;
  } catch (err) {
    State.familiaSearchResults = [];
    State.familiaSearching = false;
  }
  const el = document.getElementById('familiaSearchResults');
  if (el) el.innerHTML = renderFamiliaAddResults();
}

function renderFamiliaAddResults() {
  const results = State.familiaSearchResults || [];
  if (!results.length) return '';
  return `<div class="familia-search-results">

        <div class="familia-member-info">
          <div class="familia-member-name">${esc(r.apellido) || '—'}</div>

}

async function startGeoCapture() {
  const statusEl  = document.getElementById('geoStatus');
  const spinnerEl = document.getElementById('geoSpinner');
  const coordsEl  = document.getElementById('geoCoords');
  const footerEl  = document.getElementById('geoFooter');

  // Coordenadas por defecto: Maipú, Mendoza
  const DEFAULT = { lat: -32.9817, lng: -68.7946 };

  async function updateAddress(lat, lng) {
    const searchEl = document.getElementById('geoSearchInput');
    if (!searchEl) return;
    spinnerEl.style.display = 'inline-block';
    statusEl.textContent = 'Obteniendo dirección…';
    const addr = await Geo.reverseGeocode(lat, lng);
    spinnerEl.style.display = 'none';
    statusEl.textContent = 'Arrastrá el pin o tocá el mapa para ajustar';
    if (addr) searchEl.value = addr;
  }

  function scheduleGeocode(lat, lng) {
    clearTimeout(_geocodeDebounce);
    _geocodeDebounce = setTimeout(() => updateAddress(lat, lng), 600);
  }

  function initMap(lat, lng) {
    _map = L.map('geoMap').setView([lat, lng], 17);
    L.tileLayer('https://wms.ign.gob.ar/geoserver/gwc/service/tms/1.0.0/capabaseargenmap@EPSG%3A3857@png/{z}/{x}/{y}.png', {
      tms: true,
      maxNativeZoom: 15,
      maxZoom: 20,
      attribution: 'Mapa del <a href="https://www.ign.gob.ar">Instituto Geográfico Nacional</a> · &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    }).addTo(_map);

    if (typeof BARRIOS_GEOJSON !== 'undefined') {
      L.geoJSON(BARRIOS_GEOJSON, BARRIOS_LAYER_OPTIONS).addTo(_map);
    }

    _marker = L.marker([lat, lng], { draggable: true }).addTo(_map);

    const updateCoords = (latlng) => {
      coordsEl.textContent = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
      _updateGeoBarrio(latlng.lat, latlng.lng);
    };

    _marker.on('drag', (e) => updateCoords(e.latlng));
    _marker.on('dragend', (e) => {
      const ll = e.target.getLatLng();
      updateCoords(ll);
      scheduleGeocode(ll.lat, ll.lng);
    });

    // Tap/click en el mapa mueve el pin
    _map.on('click', (e) => {
      _marker.setLatLng(e.latlng);
      updateCoords(e.latlng);
      scheduleGeocode(e.latlng.lat, e.latlng.lng);
    });

    updateCoords({ lat, lng });
    footerEl.style.display = 'block';
    setTimeout(() => _map.invalidateSize(), 100);
    // Solo geocodificar si no tenemos ya un domicilio del padrón
    if (!State.padronDomicilio) updateAddress(lat, lng);
  }

  // Si el padrón tiene coordenadas guardadas, usarlas como centro inicial
  if (State.padronLocation) {
    spinnerEl.style.display = 'none';
    statusEl.textContent = State.padronDomicilio
      ? 'Domicilio del padrón — arrastrá el pin para actualizar'
      : 'Arrastrá el pin o tocá el mapa para ajustar';
    initMap(State.padronLocation.lat, State.padronLocation.lng);
    return;
  }

  try {
    const loc = await Geo.getLocation();
    spinnerEl.style.display = 'none';
    statusEl.textContent = 'Arrastrá el pin o tocá el mapa para ajustar';
    initMap(loc.lat, loc.lng);
  } catch (err) {
    spinnerEl.style.display = 'none';
    statusEl.textContent = `${err.message} — ajustá el pin manualmente`;
    initMap(DEFAULT.lat, DEFAULT.lng);
  }
}

function confirmGeo() {
  if (_marker) {
    const pos = _marker.getLatLng();
    State.location = { lat: pos.lat, lng: pos.lng, accuracy: 0 };
    const searchEl = document.getElementById('geoSearchInput');
    const addr = searchEl?.value?.trim() || null;
    State.domicilioReal = addr;
    if (addr) {
      State.answers.domicilio = addr;
      State.padronDomicilio   = addr;
    }
    if (State.surveyType === 'problematica' && addr) {
      State.answers.direccion = addr;
    }
    if (!State.answers.barrio && typeof barrioFromPoint === 'function') {
      const detected = barrioFromPoint(pos.lat, pos.lng);
      if (detected) State.answers.barrio = detected;
    }
  }
  go('survey');
}

async function doGeoSearch() {
  const input = document.getElementById('geoSearchInput');
  const query = input?.value?.trim();
  if (!query) return;
  const statusEl = document.getElementById('geoStatus');
  const spinnerEl = document.getElementById('geoSpinner');
  if (statusEl) statusEl.textContent = 'Buscando…';
  if (spinnerEl) spinnerEl.style.display = 'inline-block';
  const result = await Geo.geocode(query);
  if (spinnerEl) spinnerEl.style.display = 'none';
  if (!result) {
    if (statusEl) statusEl.textContent = 'No se encontró la dirección';
    return;
  }
  if (statusEl) statusEl.textContent = 'Arrastrá el pin o tocá el mapa para ajustar';
  if (input && result.address) input.value = result.address;
  if (_map && _marker) {
    const ll = L.latLng(result.lat, result.lng);
    _marker.setLatLng(ll);
    _map.setView(ll, 17);
    const coordsEl = document.getElementById('geoCoords');
    if (coordsEl) coordsEl.textContent = `${result.lat.toFixed(6)}, ${result.lng.toFixed(6)}`;
    _updateGeoBarrio(result.lat, result.lng);
  }
}
