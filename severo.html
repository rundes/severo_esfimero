/* ════════════════════════════════════════════════════════════════════════════
   Proyecto Severo — Relevamientos
   Constellation design system (evolved). Same blue/gold identity, sharpened
   craft: type + spacing scales, brand-tinted elevation tiers, ease-out motion,
   accessible focus, safe-area handling. DOM class contract is preserved.
   ════════════════════════════════════════════════════════════════════════════ */

/* ── Tokens ──────────────────────────────────────────────────────────────────── */
:root {
  /* Brand (unchanged identity) */
  --primary:        #0D47A1;
  --primary-dark:   #083B87;
  --primary-darker: #06224F;   /* pressed / deepest gradient stop */
  --primary-mid:    #1255A8;    /* header gradient highlight */
  --primary-light:  #E3F2FD;
  --accent:         #00897B;
  --accent-soft:    #E0F2F1;
  --gold:           #FFC845;

  /* Neutrals (cool, tinted toward the brand navy) */
  --bg:             #F4F6F9;
  --surface:        #FFFFFF;
  --surface-2:      #FAFBFD;    /* sticky bars, section bands */
  --border:         #DDE1E7;
  --border-strong:  #C7CEDA;    /* heavier separators, rest-state dot */
  --text:           #1A1A2E;
  --text-2:         #5C6677;
  --text-secondary: #5C6677;    /* alias: legacy references */
  --on-primary:     #FFFFFF;    /* text + icons on saturated or dark surfaces */
  --overlay-soft:   rgba(255,255,255,.16); /* subtle white overlay on blue surfaces */

  /* Semantic */
  --error:          #C62828;
  --danger:         #C62828;    /* alias: legacy references */
  --success:        #2E7D32;
  --warn:           #E65100;

  /* Semantic surface tints (state badge / button backgrounds) */
  --success-bg:     #E8F5E9;
  --success-border: #A5D6A7;
  --warn-bg:        #FFF3E0;
  --warn-border:    #FFCC80;
  --error-bg:       #FFEBEE;

  /* AA text shades: --warn / --accent fail 4.5:1 as text on light surfaces */
  --warn-text:      #B23E00;   /* ~5.4:1 on white and on --warn-bg */
  --accent-text:    #00695C;   /* ~6.6:1 on white, ~5.7:1 on --accent-soft */

  /* Relevamiento type hues (functional color-coding) */
  --type-ciudadano:         #3B82F6;
  --type-problematica:      #F59E0B;
  --type-sociohabitacional: #10B981;

  /* Radius scale */
  --radius-xs:  4px;
  --radius-sm:  8px;
  --radius:     12px;
  --radius-lg:  16px;
  --radius-pill: 999px;

  /* Spacing scale */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;

  /* Elevation (flat at rest; shadow signals lift or state, tinted navy) */
  --shadow-sm:     0 1px 2px rgba(6,34,79,.06), 0 1px 1px rgba(6,34,79,.04);
  --shadow:        0 4px 16px rgba(6,34,79,.10);
  --shadow-header: 0 1px 0 rgba(6,34,79,.10), 0 6px 18px rgba(6,34,79,.16);
  --shadow-pop:    0 12px 32px rgba(6,34,79,.20);
  --shadow-modal:  0 24px 64px rgba(6,34,79,.42);

  /* Motion (ease-out; no bounce) */
  --ease:       cubic-bezier(.22, 1, .36, 1);
  --dur-fast:   120ms;
  --dur:        180ms;
  --transition: var(--dur) var(--ease);

  /* Accessible focus ring */
  --focus: 0 0 0 3px rgba(13,71,161,.34);

  /* Safe-area insets (installed PWA / notched phones) */
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ── Reset ──────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
}

.screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.screen-center {
  align-items: center;
  justify-content: center;
  gap: var(--sp-4);
  text-align: center;
  padding: var(--sp-8);
  padding-top: calc(var(--sp-8) + var(--safe-top));
  padding-bottom: calc(var(--sp-8) + var(--safe-bottom));
}

/* ── Home screen ────────────────────────────────────────────────────────────── */
.screen-home {
  background: linear-gradient(180deg, #E3EEFF 0, var(--bg) 200px);
}

/* ── Header ─────────────────────────────────────────────────────────────────── */
.app-header {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4);
  padding-top: calc(var(--sp-3) + var(--safe-top));
  background: linear-gradient(100deg, var(--primary-dark) 0%, var(--primary) 55%, var(--primary-mid) 100%);
  color: var(--on-primary);
  position: sticky;
  top: 0;
  z-index: 10;
  min-height: 56px;
  box-shadow: var(--shadow-header);
}

.header-title {
  flex: 1;
  font-weight: 650;
  font-size: 1.0625rem;
  letter-spacing: -.01em;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.header-count {
  font-size: .8125rem;
  font-weight: 500;
  opacity: .82;
  font-variant-numeric: tabular-nums;
}

.header-logo {
  width: 32px;
  height: 32px;
  object-fit: contain;
  flex-shrink: 0;
  border-radius: var(--radius-xs);
}

.btn-icon {
  background: none;
  border: none;
  color: var(--on-primary);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 6px;
  border-radius: var(--radius-sm);
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}
.btn-icon:hover  { background: var(--overlay-soft); }
.btn-icon:active { background: rgba(255,255,255,.26); }

/* ── Progress bar ───────────────────────────────────────────────────────────── */
.progress-bar {
  height: 4px;
  background: var(--border);
}
.progress-fill {
  height: 100%;
  width: 100%;
  transform-origin: left center;
  background: linear-gradient(90deg, var(--primary), var(--primary-mid));
  transition: transform .35s var(--ease);
  will-change: transform;
}

/* ── Buttons ────────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  border: none;
  border-radius: var(--radius);
  padding: 14px var(--sp-6);
  font-size: 1rem;
  font-weight: 650;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition),
              transform var(--dur-fast) var(--ease), box-shadow var(--transition);
  min-height: 48px;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: translateY(1px); }
.btn:disabled, .btn[disabled] {
  opacity: .5;
  cursor: not-allowed;
  transform: none;
}

.btn-primary {
  background: var(--primary);
  color: var(--on-primary);
}
.btn-primary:hover  { background: var(--primary-dark); }
.btn-primary:active { background: var(--primary-darker); }

.btn-outline {
  background: transparent;
  color: var(--primary);
  border: 2px solid var(--primary);
}
.btn-outline:hover { background: var(--primary-light); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
}
.btn-ghost:hover { background: var(--border); }

.btn-block { width: 100%; }

.btn-mock {
  background: var(--surface);
  color: var(--primary);
  border: 2px solid var(--border);
  width: 100%;
}
.btn-mock:hover { border-color: var(--primary); background: var(--primary-light); }

/* Shared keyboard focus ring (visible, high-contrast) */
.btn:focus-visible,
.btn-icon:focus-visible,
.chip:focus-visible,
.filter-tab:focus-visible,
.type-card:focus-visible,
.scale-btn:focus-visible,
.radio-option:focus-visible,
.survey-card:focus-visible,
.citizen-result:focus-visible,
.btn-estado:focus-visible,
.btn-fallecido:focus-visible,
.btn-remove:focus-visible,
.familia-add-btn:focus-visible,
.btn-fallecido-quitar:focus-visible,
.pwa-install-btn:focus-visible,
.pwa-install-dismiss:focus-visible,
.loc-link:focus-visible,
.photo-thumb-remove:focus-visible {
  outline: none;
  box-shadow: var(--focus);
}

/* ── Auth screen ────────────────────────────────────────────────────────────── */
.screen-auth {
  background: linear-gradient(160deg, var(--primary) 0%, var(--primary-darker) 100%);
  justify-content: center;
  padding: var(--sp-8) var(--sp-6);
  padding-top: calc(var(--sp-8) + var(--safe-top));
  padding-bottom: calc(var(--sp-8) + var(--safe-bottom));
  gap: 0;
}

.auth-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
  color: var(--on-primary);
}

.logo-mark {
  width: 72px;
  height: 72px;
  background: rgba(255,255,255,.18);
  border: 3px solid rgba(255,255,255,.5);
  border-radius: var(--radius-lg);
  font-size: 2rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--on-primary);
  margin-bottom: var(--sp-4);
}

.logo-img {
  width: 112px;
  height: 112px;
  object-fit: contain;
  margin-bottom: var(--sp-5);
  border-radius: 26px;
  box-shadow: 0 12px 40px rgba(6,34,79,.45), 0 0 0 3px var(--overlay-soft);
}

.logo-title {
  font-size: 1.75rem;
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.1;
}

.logo-sub {
  opacity: .82;
  margin-top: var(--sp-1);
  font-size: .8125rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-weight: 600;
}

.auth-version {
  margin-top: 14px;
  background: var(--overlay-soft);
  color: rgba(255,255,255,.92);
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .06em;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  border: 1px solid rgba(255,255,255,.28);
}

.auth-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: var(--sp-6);
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  box-shadow: var(--shadow-pop);
}

.divider {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  color: var(--text-2);
  font-size: .85rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Home screen ────────────────────────────────────────────────────────────── */
.home-user {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: var(--sp-5) var(--sp-4);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.avatar-initials {
  background: var(--primary);
  color: var(--on-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: .95rem;
}

.user-name  { font-weight: 650; }
.user-email { font-size: .85rem; color: var(--text-2); }

.home-actions {
  padding: var(--sp-6) var(--sp-4);
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
}

/* ── Geo screen ─────────────────────────────────────────────────────────────── */
.screen-geo {
  height: 100dvh;
  max-height: 100dvh;
  overflow: hidden;
}

.geo-status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px var(--sp-4);
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  font-size: .875rem;
  color: var(--text-2);
  min-height: 40px;
}

.geo-spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
.geo-spinner-sm {
  width: 13px;
  height: 13px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
  display: inline-block;
  vertical-align: middle;
}

.geo-map {
  flex: 1;
  min-height: 0;
  z-index: 1;
}
.geo-map-embedded {
  flex: none;
  height: 280px;
  min-height: 280px;
}
.block-header-geo {
  margin-top: 8px;
}
.geo-footer-embedded {
  border-bottom: 1px solid var(--border);
}

.geo-footer {
  padding: var(--sp-3) var(--sp-4);
  padding-bottom: calc(var(--sp-3) + var(--safe-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
}

.geo-coords {
  font-size: .8rem;
  color: var(--text-2);
  font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace;
  text-align: center;
  min-height: 1.2em;
}
.geo-barrio {
  font-size: .82rem;
  color: var(--text-2);
  text-align: center;
  margin: 0;
}
.geo-barrio strong { color: var(--primary); }
.barrio-tooltip {
  background: rgba(255,255,255,.94);
  border: none;
  border-radius: var(--radius-xs);
  box-shadow: var(--shadow-sm);
  font-size: .78rem;
  font-weight: 600;
  padding: 3px 8px;
  color: var(--text);
}

.geo-search-row {
  display: flex;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-4) 0;
}
.geo-search-input {
  flex: 1;
  font-size: .9rem;
  padding: 8px 12px;
}
.geo-search-btn {
  flex-shrink: 0;
  font-size: .9rem;
  padding: 8px 14px;
}

.geo-actions {
  display: flex;
  gap: 10px;
}
.geo-actions .btn-primary { flex: 1; }

/* ── Type select ────────────────────────────────────────────────────────────── */
.type-loc {
  padding: 10px var(--sp-4);
  font-size: .85rem;
  color: var(--text-2);
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}

.type-cards {
  padding: var(--sp-5) var(--sp-4);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.type-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: var(--sp-5);
  text-align: left;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition),
              transform var(--dur-fast) var(--ease), box-shadow var(--transition);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.type-card:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  box-shadow: var(--shadow);
}
.type-card:active { transform: translateY(1px); }
.type-card-icon  { font-size: 2rem; line-height: 1; }
.type-card-title { font-size: 1.125rem; font-weight: 700; color: var(--text); }
.type-card-desc  { font-size: .9rem; color: var(--text-2); line-height: 1.45; }

/* ── Block header (eyebrow band) ───────────────────────────────────────────── */
.block-header {
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 8px var(--sp-4);
  border-bottom: 1px solid #BBDEFB;
}

/* ── Survey screen ──────────────────────────────────────────────────────────── */
.survey-body {
  flex: 1;
  padding: var(--sp-6) var(--sp-4);
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);
  overflow-y: auto;
}

.question-label {
  font-size: 1.0625rem;
  font-weight: 650;
  line-height: 1.4;
  display: block;
}

.required { color: var(--error); margin-left: var(--sp-1); }

.padron-badge {
  display: inline-block;
  margin-left: var(--sp-2);
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--accent-text);
  background: var(--accent-soft);
  border: 1px solid #80CBC4;
  border-radius: var(--radius-xs);
  padding: 1px 6px;
  vertical-align: middle;
}

.question-hint {
  font-size: .85rem;
  color: #6B5300;
  background: #FFF8E1;
  border: 1px solid #FFE082;
  padding: 10px var(--sp-3);
  border-radius: var(--radius-sm);
  line-height: 1.45;
}

.question-input { display: flex; flex-direction: column; gap: var(--sp-2); }

.input, .textarea, select {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 1rem;
  color: var(--text);
  background: var(--surface);
  transition: border-color var(--transition), box-shadow var(--transition);
  font-family: inherit;
}
.input:focus, .textarea:focus, select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: var(--focus);
}
.input:disabled, .textarea:disabled, select:disabled {
  background: var(--bg);
  color: var(--text-2);
  cursor: not-allowed;
}
.input.error, .input[aria-invalid="true"], .textarea[aria-invalid="true"] {
  border-color: var(--error);
}
.input.error:focus, .input[aria-invalid="true"]:focus {
  box-shadow: 0 0 0 3px rgba(198,40,40,.28);
}

.textarea { resize: vertical; min-height: 96px; }

/* Scale */
.scale-row {
  display: flex;
  gap: var(--sp-2);
}
.scale-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--sp-1);
  padding: 10px var(--sp-1);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition),
              color var(--transition), transform var(--dur-fast) var(--ease);
}
.scale-btn:hover   { border-color: var(--primary); background: var(--primary-light); }
.scale-btn:active  { transform: translateY(1px); }
.scale-btn.active  { border-color: var(--primary); background: var(--primary); color: var(--on-primary); }
.scale-num { font-size: 1.1rem; font-weight: 700; }
.scale-lbl { font-size: .6rem; text-align: center; line-height: 1.2; }

/* Chips */
.chip-group { display: flex; flex-wrap: wrap; gap: var(--sp-2); }
.chip {
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  background: var(--surface);
  cursor: pointer;
  font-size: .9rem;
  font-family: inherit;
  transition: border-color var(--transition), background var(--transition),
              color var(--transition), transform var(--dur-fast) var(--ease);
  color: var(--text);
}
.chip:hover  { border-color: var(--primary); background: var(--primary-light); }
.chip:active { transform: translateY(1px); }
.chip.active { border-color: var(--primary); background: var(--primary); color: var(--on-primary); }

/* Radio */
.radio-group { display: flex; flex-direction: column; gap: var(--sp-2); }
.radio-option {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-3);
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  font-size: .95rem;
}
.radio-option input[type=radio] { margin-top: 2px; accent-color: var(--primary); }
.radio-option:hover  { border-color: var(--primary); background: var(--primary-light); }
.radio-option.active { border-color: var(--primary); background: var(--primary-light); box-shadow: inset 0 0 0 1px var(--primary); }

.survey-footer {
  display: flex;
  gap: 10px;
  padding: var(--sp-3) var(--sp-4);
  padding-bottom: calc(var(--sp-3) + var(--safe-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  position: sticky;
  bottom: 0;
  box-shadow: 0 -4px 16px rgba(6,34,79,.06);
}
.survey-footer .btn-primary { flex: 1; }

/* ── Summary ────────────────────────────────────────────────────────────────── */
.summary-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-4);
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
}

.summary-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-size: .9rem;
  color: var(--text-2);
  padding-bottom: var(--sp-2);
  border-bottom: 1px solid var(--border);
}

.loc-link { color: var(--primary); text-decoration: none; font-weight: 500; border-radius: var(--radius-xs); }
.loc-link:hover { text-decoration: underline; }

.summary-table { width: 100%; border-collapse: collapse; }
.summary-table td { padding: 10px var(--sp-2); border-bottom: 1px solid var(--border); vertical-align: top; }
.summary-label { color: var(--text-2); font-size: .85rem; width: 40%; }
.summary-value { font-size: .95rem; font-weight: 500; }

/* ── Saving / Done ──────────────────────────────────────────────────────────── */
.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.done-icon   { font-size: 3.5rem; line-height: 1; }
.done-sub    { color: var(--text-2); }
.done-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: var(--sp-4); }

/* ── List filter bar ──────────────────────────────────────────────────────── */
.list-filter-bar {
  display: flex;
  gap: 6px;
  padding: 10px var(--sp-4);
  overflow-x: auto;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.list-filter-bar::-webkit-scrollbar { display: none; }

.filter-tab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 8px 14px;
  min-height: 44px;
  border-radius: var(--radius-pill);
  border: 1.5px solid var(--border);
  background: transparent;
  font-size: .8rem;
  font-weight: 550;
  font-family: inherit;
  color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  transition: border-color var(--transition), color var(--transition), background var(--transition);
  flex-shrink: 0;
}
.filter-tab:hover { border-color: var(--primary); color: var(--primary); }
.filter-tab.active {
  background: var(--primary);
  border-color: var(--primary);
  color: var(--on-primary);
}
.filter-tab-count {
  background: var(--border);
  color: var(--text-2);
  border-radius: var(--radius-pill);
  padding: 1px 6px;
  font-size: .72rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.filter-tab.active .filter-tab-count {
  background: rgba(255,255,255,.28);
  color: var(--on-primary);
}

/* ── Survey list ──────────────────────────────────────────────────────────── */
.list-body {
  padding: var(--sp-3) var(--sp-4);
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  flex: 1;
}

.list-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--sp-3);
  padding: 48px var(--sp-4);
  color: var(--text-2);
  font-size: .9rem;
  text-align: center;
}
.list-spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

.survey-card {
  display: flex;
  align-items: stretch;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color var(--transition), box-shadow var(--transition),
              transform var(--dur-fast) var(--ease);
}
.survey-card:hover  { border-color: var(--primary); box-shadow: var(--shadow); }
.survey-card:active { transform: translateY(1px); }

/* Type indicator: a leading status dot (not a side stripe) */
.card-accent {
  flex-shrink: 0;
  align-self: center;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  margin-left: 14px;
  background: var(--border-strong);
}
.survey-card--ciudadano         .card-accent { background: var(--type-ciudadano); }
.survey-card--problematica      .card-accent { background: var(--type-problematica); }
.survey-card--sociohabitacional .card-accent { background: var(--type-sociohabitacional); }

.card-body  { flex: 1; min-width: 0; padding: 12px 10px 12px 12px; }

.card-top-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: var(--sp-1);
}
.card-type-label {
  font-size: .72rem;
  font-weight: 700;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.card-barrio {
  font-size: .72rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 1px 8px;
  color: var(--text-2);
}
.card-title {
  font-size: .97rem;
  font-weight: 650;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.card-subtitle {
  font-size: .82rem;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 5px;
}
.card-bottom-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.card-date { font-size: .76rem; color: var(--text-2); }
.card-loc  { font-size: .72rem; color: var(--text-2); font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace; }

.card-arrow {
  display: flex;
  align-items: center;
  padding: 0 12px 0 6px;
  font-size: 1.3rem;
  color: var(--border-strong);
  flex-shrink: 0;
  transition: color var(--transition), transform var(--dur) var(--ease);
}
.survey-card:hover .card-arrow { color: var(--primary); transform: translateX(2px); }

/* ── Toast ──────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(80px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--on-primary);
  padding: 10px var(--sp-5);
  border-radius: var(--radius-sm);
  font-size: .9rem;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
  white-space: nowrap;
  z-index: 100;
  box-shadow: var(--shadow-pop);
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Utilities ──────────────────────────────────────────────────────────────── */
.hint {
  font-size: .82rem;
  color: var(--text-2);
  text-align: center;
  padding: var(--sp-2) var(--sp-4);
}
.center { text-align: center; }
.loading-init {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  color: var(--text-2);
}

/* ── Citizen search ──────────────────────────────────────────────────────────── */
.search-group { display: flex; flex-direction: column; gap: var(--sp-2); }

.search-divider {
  text-align: center;
  font-size: .82rem;
  color: var(--text-2);
  padding: 2px 0;
}

.search-status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: var(--sp-5) var(--sp-4);
  color: var(--text-2);
  font-size: .9rem;
}
.search-error { color: var(--error); font-size: .82rem; text-align: center; }

.citizen-results { display: flex; flex-direction: column; gap: var(--sp-2); margin-top: var(--sp-1); }

.citizen-result {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px var(--sp-4);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition),
              transform var(--dur-fast) var(--ease);
}
.citizen-result:hover  { border-color: var(--primary); background: var(--primary-light); }
.citizen-result:active { transform: translateY(1px); }

.citizen-result-name { font-weight: 700; font-size: 1rem; color: var(--text); }
.citizen-result-info { font-size: .82rem; color: var(--text-2); margin-top: 3px; }

.google-login-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 44px;
  justify-content: center;
}

.google-not-configured {
  font-size: .78rem;
  color: var(--warn-text);
  text-align: center;
  padding: var(--sp-1) 0 0;
}

.btn-google {
  background: #fff;
  border: 1px solid #dadce0;
  color: #3c4043;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  font-size: .95rem;
  font-weight: 500;
  border-radius: var(--radius-xs);
  box-shadow: var(--shadow-sm);
}
.btn-google:hover { background: #f8f9fa; border-color: #c6c6c6; }

/* ── Home padrón search ──────────────────────────────────────────────────────── */
.home-search-section {
  padding: 0 var(--sp-4) var(--sp-5);
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
}

.home-search-label {
  font-size: .6875rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
  color: var(--text-2);
  padding-top: var(--sp-1);
}

/* ── Search mode tabs ───────────────────────────────────────────────────────── */
.search-mode-tabs {
  display: flex;
  gap: 6px;
  margin: var(--sp-2) 0 var(--sp-2);
}
.search-mode-tab {
  flex: 1;
  padding: 7px 0;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  font-size: .85rem;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
}
.search-mode-tab.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  font-weight: 600;
}

/* ── Padrón detail screen ────────────────────────────────────────────────────── */
.padron-detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 var(--sp-4);
  padding-bottom: calc(80px + var(--safe-bottom));
}

.padron-detail-hero {
  padding: var(--sp-5) 0 var(--sp-4);
  border-bottom: 2px solid var(--border);
  margin-bottom: var(--sp-5);
}

.padron-detail-name {
  font-size: 1.375rem;
  font-weight: 750;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -.01em;
}

.padron-detail-sub {
  font-size: .88rem;
  color: var(--text-2);
  margin-top: var(--sp-1);
}

.padron-section {
  margin-bottom: var(--sp-5);
}

.padron-section-title {
  font-size: .6875rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
  padding-bottom: var(--sp-1);
  border-bottom: 2px solid var(--primary-light);
}

.padron-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: var(--sp-2) 0;
  border-bottom: 1px solid var(--border);
  gap: var(--sp-3);
}

.padron-key {
  font-size: .8rem;
  color: var(--text-2);
  flex-shrink: 0;
  min-width: 120px;
}

.padron-val {
  font-size: .85rem;
  color: var(--text);
  font-weight: 500;
  text-align: right;
  flex: 1;
}

.padron-actions {
  padding: var(--sp-3) 0 var(--sp-2);
}

/* ── Familia group ───────────────────────────────────────────────────────────── */
.familia-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 10px;
}

.familia-member {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px var(--sp-3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  gap: var(--sp-2);
}

.familia-member-info { flex: 1; min-width: 0; }

.familia-member-name {
  font-size: .9rem;
  font-weight: 650;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.familia-member-sub {
  font-size: .76rem;
  color: var(--text-2);
  margin-top: 2px;
}

.btn-remove {
  background: none;
  border: none;
  color: var(--error);
  cursor: pointer;
  font-size: 1rem;
  padding: var(--sp-1) 6px;
  border-radius: 6px;
  flex-shrink: 0;
  min-width: 32px;
  min-height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: background var(--transition);
}
.btn-remove:hover { background: var(--error-bg); }

.familia-add-row { margin-top: var(--sp-2); }

.familia-search-results {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.familia-search-result {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--sp-2) var(--sp-3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  gap: var(--sp-2);
}

.familia-add-btn {
  flex-shrink: 0;
  font-size: .8rem;
  padding: 8px 12px;
  min-height: 36px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--primary);
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color var(--transition), background var(--transition);
}
.familia-add-btn:hover { border-color: var(--primary); background: var(--primary-light); }

/* ── Electoral participation grid ───────────────────────────────────────────── */
.elec-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: var(--sp-1);
}

.elec-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px var(--sp-2);
  flex: 1;
  min-width: 72px;
  max-width: 90px;
}

.elec-label {
  font-size: .62rem;
  color: var(--text-2);
  text-align: center;
  line-height: 1.2;
}

.elec-value {
  font-size: .72rem;
  font-weight: 700;
  margin-top: var(--sp-1);
  text-align: center;
  line-height: 1.2;
}

.elec-voted   { color: var(--success); }
.elec-absent  { color: var(--error); }
.elec-neutral { color: var(--text-2); }

/* ── Photo input ─────────────────────────────────────────────────────────────── */
.photo-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.photo-preview {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  display: block;
}

.photo-empty {
  width: 100%;
  height: 120px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  font-size: .9rem;
  background: var(--bg);
}

.photo-btn {
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
}

.photo-status {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: .82rem;
  min-height: 20px;
}
.photo-ok   { color: var(--success); font-weight: 600; }
.photo-warn { color: var(--warn-text); }

/* ── Summary / detail photo ──────────────────────────────────────────────────── */
.summary-photo {
  width: 100%;
  max-height: 220px;
  object-fit: cover;
  border-radius: var(--radius);
  display: block;
}

.detail-photo {
  width: 100%;
  max-height: 240px;
  object-fit: cover;
  border-radius: var(--radius);
  display: block;
  cursor: zoom-in;
  transition: max-height .3s var(--ease);
}
.detail-photo.detail-photo-expand {
  max-height: 80vh;
  cursor: zoom-out;
}
.detail-photo-fallback {
  padding: .75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: center;
  font-size: .875rem;
}
.detail-photo-fallback a {
  color: var(--primary);
  font-weight: 600;
  text-decoration: none;
}

/* ── Photo grid (multi-photo) ───────────────────────────────────────────────── */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-2);
}
.photo-thumb-wrap {
  position: relative;
  aspect-ratio: 1;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1.5px solid var(--border);
  background: var(--bg);
}
.photo-thumb {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.photo-thumb-remove {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(13,28,46,.78);
  color: var(--on-primary);
  border: 2px solid rgba(255,255,255,.6);
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  padding: 0;
  z-index: 1;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.photo-add-btn {
  aspect-ratio: 1;
  border-radius: var(--radius);
  border: 2px dashed var(--border);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-2);
  font-size: .75rem;
  gap: var(--sp-1);
  text-align: center;
  transition: border-color var(--transition), color var(--transition);
}
.photo-add-btn:hover { border-color: var(--primary); color: var(--primary); }
.photo-add-icon {
  font-size: 1.5rem;
  line-height: 1;
}
.detail-photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-2);
  margin-bottom: var(--sp-1);
}
.detail-photo-item {
  aspect-ratio: 1;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: zoom-in;
  transition: transform .2s var(--ease);
}
.detail-photo-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.detail-photo-item.detail-photo-item-expand {
  grid-column: 1 / -1;
  aspect-ratio: unset;
  cursor: zoom-out;
}
.detail-photo-item.detail-photo-item-expand img {
  height: auto;
  max-height: 70vh;
  object-fit: contain;
}

/* ── Estado badge ────────────────────────────────────────────────────────────── */
.estado-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px var(--sp-2);
  border-radius: var(--radius-pill);
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .02em;
  vertical-align: middle;
  flex-shrink: 0;
}
.estado-pendiente { background: #F3F4F6; color: var(--text-2);  border: 1px solid var(--border); }
.estado-persiste  { background: var(--warn-bg); color: var(--warn-text); border: 1px solid var(--warn-border); }
.estado-resuelto  { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }

/* ── Estado actions (detail screen) ─────────────────────────────────────────── */
.estado-section {
  padding: var(--sp-4) 0 var(--sp-1);
  border-top: 1px solid var(--border);
  margin-top: var(--sp-2);
}

.estado-section-title {
  font-size: .6875rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
  color: var(--text-2);
  margin-bottom: 10px;
}

.estado-actions {
  display: flex;
  gap: 10px;
}

.btn-estado {
  flex: 1;

/* ── PWA install card ──────────────────────────────────────────────────────── */
.pwa-install-card {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  background: linear-gradient(135deg, var(--primary-mid) 0%, var(--primary-dark) 100%);
  border-radius: var(--radius);
  padding: 14px var(--sp-4);
  margin: 0 0 var(--sp-4);
  position: relative;
  box-shadow: var(--shadow-pop);
  animation: slideDown .25s var(--ease);
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.pwa-install-icon {
  font-size: 1.8rem;
  flex-shrink: 0;
  line-height: 1;
}
.pwa-install-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
  color: var(--on-primary);
}
.pwa-install-text strong {
  font-size: .95rem;
  font-weight: 700;
}
.pwa-install-text span {
  font-size: .78rem;
  opacity: .88;
  line-height: 1.4;
}
.pwa-install-btn {
  flex-shrink: 0;
  padding: 8px 14px;
  font-size: .82rem;
  font-weight: 700;
  min-height: 40px;
  background: var(--surface);
  color: var(--primary);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
}
.pwa-install-btn:hover { background: var(--primary-light); }
.pwa-install-dismiss {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(255,255,255,.2);
  border: none;
  color: var(--on-primary);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  touch-action: manipulation;
}
/* Expand the tap target to ~44px without growing the visual circle */
.pwa-install-dismiss::before {
  content: '';
  position: absolute;
  inset: -8px;
}

/* ── PWA update modal (blocking) ───────────────────────────────────────────── */
.pwa-update-modal {
  position: fixed;
  inset: 0;
  background: rgba(6,34,79,.62);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-6);

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.pwa-update-box {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 36px 28px 28px;

  width: 100%;

.pwa-update-icon {
  font-size: 3rem;
  margin-bottom: var(--sp-4);
  animation: spin 1.4s linear infinite;
}
.pwa-update-title {
  font-size: 1.25rem;
  font-weight: 700;
  margin: 0 0 var(--sp-3);
  color: var(--text);
}
.pwa-update-body {
  font-size: .9rem;
  color: var(--text-2);
  line-height: 1.6;
  margin: 0 0 var(--sp-6);
}
.pwa-update-btn {
  font-size: 1rem;
  padding: 14px;
}
.pwa-update-hint {
  margin-top: var(--sp-3);
  font-size: .75rem;
  color: var(--text-2);
  opacity: .8;
}

/* ── App footer ─────────────────────────────────────────────────────────────── */
.app-footer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  padding: var(--sp-5) var(--sp-4) calc(28px + var(--safe-bottom));

.footer-version {
  background: var(--primary);

  font-size: .68rem;
  font-weight: 700;
  padding: 2px 7px;

/* ── Reduced motion: keep loading spinners, drop decorative motion ──────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: .01ms !important;
    scroll-behavior: auto !important;
  }
  .pwa-install-card { animation: none; }
  .pwa-update-modal { animation: none; }
  .survey-card:hover .card-arrow { transform: none; }
}

  <script>
const Geo = {
  async getLocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('El navegador no soporta geolocalización'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: Math.round(pos.coords.accuracy),
        }),
        (err) => {
          const msgs = {
            1: 'Permiso de ubicación denegado',
            2: 'Ubicación no disponible',
            3: 'Tiempo de espera agotado',
          };
          reject(new Error(msgs[err.code] || 'Error al obtener ubicación'));
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
      );
    });
  },

  format(location) {
    if (!location) return 'Sin ubicación';
    return `${location.lat.toFixed(6)}, ${location.lng.toFixed(6)} (±${location.accuracy}m)`;
  },

  mapsUrl(location) {
    if (!location) return null;
    return `https://www.google.com/maps?q=${location.lat},${location.lng}`;
  },

  async reverseGeocode(lat, lng) {
    if (CONFIG.GOOGLE_API_KEY) {
      try {
        const res = await fetch(
          `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${CONFIG.GOOGLE_API_KEY}&language=es&result_type=street_address`
        );
        if (res.ok) {
          const data = await res.json();
          if (data.status === 'OK' && data.results?.[0]) return data.results[0].formatted_address;
        }
      } catch {}
    }
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=es`,
        { headers: { 'User-Agent': 'SeveroMaipu/1.0' } }
      );
      if (res.ok) {
        const data = await res.json();
        if (data?.display_name) return data.display_name;
      }
    } catch {}
    return null;
  },

  async geocode(query) {
    if (!query) return null;
    if (CONFIG.GOOGLE_API_KEY) {
      try {
        const res = await fetch(
          `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=${CONFIG.GOOGLE_API_KEY}&language=es&region=ar`
        );
        if (res.ok) {
          const data = await res.json();
          if (data.status === 'OK' && data.results?.[0]) {
            const r = data.results[0];
            return { lat: r.geometry.location.lat, lng: r.geometry.location.lng, address: r.formatted_address };
          }
        }
      } catch {}
    }
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=ar&accept-language=es`,
        { headers: { 'User-Agent': 'SeveroMaipu/1.0' } }
      );
      if (res.ok) {
        const data = await res.json();
        if (data?.[0]) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), address: data[0].display_name };
      }
    } catch {}
    return null;
  },
};

  <script>
// ── Google Cloud Storage ─────────────────────────────────────────────────────
const GCS = {
  async compress(file, maxPx = 1200, quality = 0.78) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const ratio = Math.min(maxPx / Math.max(img.width, img.height), 1);
          const canvas = document.createElement('canvas');
          canvas.width  = Math.round(img.width  * ratio);
          canvas.height = Math.round(img.height * ratio);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(resolve, 'image/jpeg', quality);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  },

  async upload(blob, filename) {
    const token = localStorage.getItem('severo_access_token');
    if (!token) throw new Error('401');
    const bucket = (typeof CONFIG !== 'undefined' && CONFIG.GCS_BUCKET) || 'maipu-pba';
    const url = `https://storage.googleapis.com/upload/storage/v1/b/${encodeURIComponent(bucket)}/o?uploadType=media&name=${encodeURIComponent(filename)}&predefinedAcl=publicRead`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
      body: blob,
    });
    if (res.status === 401) throw new Error('401');
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(`GCS ${res.status}: ${body.error?.message || 'Error al subir la foto'}`);
    }
    // Los slashes del nombre deben quedar sin codificar en la URL pública
    const publicName = filename.split('/').map(encodeURIComponent).join('/');
    return `https://storage.googleapis.com/${bucket}/${publicName}`;
  },

  filename(prefix = 'fotos') {
    const ts  = Date.now();
    const rnd = Math.random().toString(36).slice(2, 8);
    return `${prefix}/${ts}-${rnd}.jpg`;
  },
};

  <script>
const SheetsDB = {
  _hasToken() {
    return !!localStorage.getItem('severo_access_token');
  },

  async save(type, record) {
    if (!this._hasToken()) return this._mockSave(type, record);
    return this._apiAppend(type, record);
  },

  getAll(type) {
    return this._mockGetAll(type);
  },

  async getAllAsync(type) {
    if (!this._hasToken()) return this._mockGetAll(type);
    return this._apiGetAll(type);
  },

  async update(type, id, updates) {
    this._mockUpdate(type, id, updates);
    if (this._hasToken()) return this._apiUpdate(type, id, updates);
  },

  // ── Mock (localStorage) ──────────────────────────────────────────────────

  _mockSave(type, record) {
    const key = `severo_${type}`;
    const items = JSON.parse(localStorage.getItem(key) || '[]');
    const saved = { ...record, id: Date.now(), savedAt: new Date().toISOString() };
    items.unshift(saved);
    localStorage.setItem(key, JSON.stringify(items));
    return saved;
  },

  _mockGetAll(type) {
    const key = `severo_${type}`;
    return JSON.parse(localStorage.getItem(key) || '[]');
  },

  _mockUpdate(type, id, updates) {
    const key = `severo_${type}`;
    const items = JSON.parse(localStorage.getItem(key) || '[]');
    const idx = items.findIndex((i) => String(i.id) === String(id));
    if (idx >= 0) {
      items[idx] = { ...items[idx], ...updates, updatedAt: new Date().toISOString() };
      localStorage.setItem(key, JSON.stringify(items));
    }
  },

  // ── Google Sheets API ────────────────────────────────────────────────────

  _sheetForType(type) {
    if (type === 'ciudadano')        return CONFIG.SHEET_CIUDADANOS;
    if (type === 'sociohabitacional') return CONFIG.SHEET_SOCIOHABITACIONAL;
    return CONFIG.SHEET_PROBLEMATICAS;
  },

  async _apiAppend(type, record) {
    const sheet = this._sheetForType(type);
    const token = this._getToken();
    const row = this._toRow(type, record);

    console.log('[SheetsDB] guardando en pestaña:', sheet);
    console.log('[SheetsDB] fila:', row);

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${encodeURIComponent(sheet)}!A1:append?valueInputOption=USER_ENTERED`;

    const doAppend = () => fetch(url, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [row] }),
    });

    let res = await doAppend();
    console.log('[SheetsDB] append status:', res.status);

    if (res.status === 400 || res.status === 404) {
      console.log('[SheetsDB] pestaña no encontrada, creando:', sheet);
      const createRes = await this._createSheet(CONFIG.SURVEY_SPREADSHEET_ID, sheet, token);
      console.log('[SheetsDB] createSheet status:', createRes.status);
      await new Promise((r) => setTimeout(r, 800));
      await this._writeHeaders(type, CONFIG.SURVEY_SPREADSHEET_ID, sheet, token);
      res = await doAppend();
      console.log('[SheetsDB] retry status:', res.status);
    }

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      console.error('[SheetsDB] error body:', errBody);
      throw new Error(`Sheets API ${res.status}: ${errBody.error?.message || JSON.stringify(errBody)}`);
    }
    return record;
  },

  async _createSheet(spreadsheetId, sheetName, token) {
    return fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`,
      {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{ addSheet: { properties: { title: sheetName } } }],
        }),
      }
    );
  },

  _toHeaders(type) {
    const base = ['ID', 'Fecha', 'Email operador', 'Nombre operador', 'Latitud', 'Longitud', 'Precisión (m)'];
    if (type === 'ciudadano') {
      return [...base, 'DNI', 'Apellido y nombre', 'Apodo', 'Domicilio', 'Barrio', 'Edad', 'Residencia',
        'Calidad de vida', 'Problemas', 'Mejoras', 'Comentarios', 'Fallecido'];
    }
    if (type === 'sociohabitacional') {
      return [...base, 'DNI', 'Apellido y nombre', 'Apodo', 'Domicilio', 'Barrio',
        'Personas total', 'Menores de 18', 'Mayores de 65', 'Familias', 'Tenencia',
        'Escritura', 'Cuotas adeudadas', 'Tipo vivienda', 'Material paredes', 'Ambientes dormir',
        'Desagüe', 'Agua potable', 'Electricidad', 'Gas', 'Discapacidad', 'Tipo discapacidad',
        'CUD', 'Actividades menores', 'Actividades adultos', 'Actividades mayores',
        'Mejora barrio', 'Mejora municipio', 'Falta Maipú', 'Voto',
        'Estado de la vivienda', 'Participa menores', 'Participa adultos', 'Participa mayores',
        'Políticas municipales', 'Foto frente'];
    }
    return [...base, 'Categoría', 'Dirección', 'Barrio', 'Descripción', 'Urgencia', 'Afecta tránsito', 'Observaciones', 'Foto URL', 'Estado'];
  },

  async _writeHeaders(type, spreadsheetId, sheet, token) {
    const headers = this._toHeaders(type);
    return fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheet)}!A1?valueInputOption=USER_ENTERED`,
      {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [headers] }),
      }
    );
  },

  async _apiGetAll(type) {
    const sheet = this._sheetForType(type);
    const token = this._getToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${encodeURIComponent(sheet)}`;
    console.log('[SheetsDB] getAllAsync:', sheet);
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    console.log('[SheetsDB] getAllAsync status:', res.status, sheet);
    if (res.status === 400 || res.status === 404) return []; // pestaña aún no creada
    if (!res.ok) throw new Error(`Sheets API error ${res.status} al leer ${sheet}`);
    const data = await res.json();
    return this._fromRows(type, data.values || []);
  },

  _getToken() {
    const t = localStorage.getItem('severo_access_token');
    if (!t) throw new Error('Sin token de acceso. Reautenticar con scope de Sheets.');
    return t;
  },

  _sc(v) {
    const s = String(v ?? '');
    return /^[=+\-@|]/.test(s) ? "'" + s : s;
  },

  _toRow(type, r) {
    const sc = (v) => this._sc(v);
    const _coq = (chips, otros) => {
      const parts = [...(Array.isArray(chips) ? chips : (chips ? [chips] : [])), otros || ''].filter(Boolean);
      return parts.join(', ');
    };
    const base = [
      r.id || '',
      r.savedAt || new Date().toISOString(),
      r.operador?.email || '',
      r.operador?.name || '',
      r.location?.lat || '',
      r.location?.lng || '',
      r.location?.accuracy || '',
    ];
    if (type === 'ciudadano') {
      const a = r.answers || {};
      return [...base, a.dni || '', sc(a.apellido), sc(a.apodo), sc(a.domicilio), a.barrio || '',
        a.edad || '', a.residencia || '', a.calidad_vida || '',
        (a.problemas || []).join(', '), sc(a.mejoras), sc(a.comentarios), r.fallecido || ''];
    }
    if (type === 'sociohabitacional') {
      const a = r.answers || {};
      const domicilio = [a.domicilio_calle, a.domicilio_numero].filter(Boolean).join(' ') || a.domicilio || '';
      return [...base, a.dni || '', sc(a.apellido), sc(a.apodo), sc(domicilio),
        a.barrio || '', a.personas_total || '', a.personas_menores || '',
        a.personas_mayores65 || '', a.familias || '', a.tenencia || '',
        a.escritura || '', a.cuotas_adeuda || '', a.tipo_vivienda || '',
        a.material_paredes || '', a.ambientes_dormir || '', a.desague || '',
        a.agua_potable || '', a.electricidad || '', a.gas || '',
        a.discapacidad || '', (a.tipo_discapacidad || []).join(', '), a.cud || '',
        (a.actividades_menores || []).join(', '), (a.actividades_adultos || []).join(', '),
        (a.actividades_mayores || []).join(', '), _coq(a.mejora_barrio, a.mejora_barrio_otros),
        '', _coq(a.falta_maipu, a.falta_maipu_otros), a.voto || '',
        a.vivienda_estado || '', a.participa_menores || '', a.participa_adultos || '', a.participa_mayores || '',
        _coq(a.politicas_municipio, a.politicas_municipio_otros),
        Array.isArray(a.foto_frente) ? a.foto_frente.filter(Boolean).join('\n') : (a.foto_frente || '')];
    }
    const a = r.answers || {};
    const fotoStr = Array.isArray(a.foto_url)
      ? a.foto_url.filter(Boolean).join('\n')
      : (a.foto_url || '');
    return [...base, a.categoria || '', sc(a.direccion), a.barrio || '', sc(a.descripcion),
      a.urgencia || '', a.afecta_transito || '', sc(a.observaciones),
      fotoStr, sc(r.estado || '')];
  },

  _fromRows(type, rows) {
    return rows.slice(1).filter(row => row.length > 0).map((row) => {
      const base = { id: row[0], savedAt: row[1], operador: { email: row[2], name: row[3] },
        location: { lat: parseFloat(row[4]), lng: parseFloat(row[5]), accuracy: parseInt(row[6]) } };
      if (type === 'ciudadano') {
        return { ...base, answers: { dni: row[7], apellido: row[8], apodo: row[9],
          domicilio: row[10], barrio: row[11], edad: row[12], residencia: row[13],
          calidad_vida: row[14], problemas: row[15] ? row[15].split(', ') : [],
          mejoras: row[16], comentarios: row[17] }, fallecido: row[18] || '' };
      }
      if (type === 'sociohabitacional') {
        return { ...base, answers: { dni: row[7], apellido: row[8], apodo: row[9],
          domicilio_calle: row[10], domicilio_numero: '', barrio: row[11], personas_total: row[12],
          personas_menores: row[13], personas_mayores65: row[14], familias: row[15],
          tenencia: row[16], escritura: row[17], cuotas_adeuda: row[18],
          tipo_vivienda: row[19], material_paredes: row[20], ambientes_dormir: row[21],
          desague: row[22], agua_potable: row[23], electricidad: row[24], gas: row[25],
          discapacidad: row[26], tipo_discapacidad: row[27] ? row[27].split(', ') : [],
          cud: row[28], actividades_menores: row[29] ? row[29].split(', ') : [],
          actividades_adultos: row[30] ? row[30].split(', ') : [],
          actividades_mayores: row[31] ? row[31].split(', ') : [],
          mejora_barrio: [], mejora_barrio_otros: row[32] || '',
          falta_maipu: [], falta_maipu_otros: row[34] || '',
          voto: row[35], vivienda_estado: row[36] || '',
          participa_menores: row[37] || '', participa_adultos: row[38] || '', participa_mayores: row[39] || '',
          politicas_municipio: [], politicas_municipio_otros: row[40] || '',
          foto_frente: (row[41] || '').split('\n').map(u => u.replace(/%2F/gi, '/')).filter(Boolean) } };
      }
      return { ...base, answers: { categoria: row[7], direccion: row[8], barrio: row[9],
        descripcion: row[10], urgencia: row[11], afecta_transito: row[12], observaciones: row[13],
        foto_url: (row[14] || '').split('\n').map(u => u.replace(/%2F/gi, '/')).filter(Boolean) },
        estado: row[15] || '' };
    });
  },

  async _apiUpdate(type, id, updates) {
    const sheet = this._sheetForType(type);
    const token = this._getToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${encodeURIComponent(sheet)}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) return;
    const rows = (await res.json()).values || [];
    const rowIdx = rows.findIndex((r, i) => i > 0 && String(r[0]).trim() === String(id).trim());
    if (rowIdx < 0) return;
    const sheetRow = rowIdx + 1;
    if (type === 'problematica' && updates.estado !== undefined) {
      const range = `${encodeURIComponent(sheet)}!P${sheetRow}`;
      await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`,
        {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ values: [[updates.estado]] }),
        }
      );
    }
    if (type === 'ciudadano' && updates.fallecido !== undefined) {
      const range = `${encodeURIComponent(sheet)}!S${sheetRow}`;
      await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`,

// ── Padrón electoral ─────────────────────────────────────────────────────────
// LECTURA: API Key de Google (no requiere token del relevador)

const Padron = {
  _cache: {},

  _hasApiKey() { return !!CONFIG.GOOGLE_API_KEY; },

  _apiKeyParam() { return CONFIG.GOOGLE_API_KEY ? `?key=${CONFIG.GOOGLE_API_KEY}` : ''; },

  searchByDNI(dni) { return this._mockSearch(dni); },

  async searchByDNIAsync(dni) {
    if (!this._hasApiKey()) return this._mockSearch(dni);
    return this._apiSearch(dni);
  },

  async searchByApellidoAsync(query) {
    if (!this._hasApiKey()) return this._mockSearchByApellido(query);
    return this._apiSearchByApellido(query);
  },

  async searchByDomicilioAsync(query) {
    if (!this._hasApiKey()) return this._mockSearchByDomicilio(query);
    return this._apiSearchByDomicilio(query);
  },

  async updateLatLng(meta, lat, lng, domicilioReal) {
    if (!meta?.coordRange) return;
    const token = localStorage.getItem('severo_access_token');
    if (!token) return this._mockUpdateLatLng(meta, lat, lng);
    return this._apiUpdateLatLng(meta, lat, lng, domicilioReal);
  },

  async upsertByDNI(record) { return this._mockUpsert(record); },

  _titleCase(str) {
    if (!str) return '';
    return String(str).toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
  },

  // ── Mock ──────────────────────────────────────────────────────────────────

  _mockSearch(dni) {
    if (!dni) return null;
    const dniStr = String(dni).trim();
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    const found = items.find((r) => r.dni === dniStr);
    if (!found) return null;
    return { ...found, _meta: { dni: dniStr } };
  },

  _mockSearchByApellido(query) {
    if (!query || query.length < 4) return [];
    const q = query.toLowerCase();
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    return items
      .filter((r) => (r.apellido || '').toLowerCase().includes(q))
      .slice(0, 15)
      .map((r) => ({ ...r, _meta: { dni: r.dni } }));
  },

  _mockSearchByDomicilio(query) {
    if (!query || query.length < 4) return [];
    const q = query.toLowerCase();
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    return items
      .filter((r) => (r.domicilio || '').toLowerCase().includes(q))
      .slice(0, 15)
      .map((r) => ({ ...r, _meta: { dni: r.dni } }));
  },

  _mockUpsert(record) {
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    const idx = items.findIndex((r) => r.dni === String(record.dni).trim());
    const updated = { ...record, updatedAt: new Date().toISOString() };
    if (idx >= 0) items[idx] = { ...items[idx], ...updated };
    else items.push(updated);
    localStorage.setItem('severo_padron', JSON.stringify(items));
    return updated;
  },

  _mockUpdateLatLng(meta, lat, lng) {
    if (!meta?.dni) return;
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    const idx = items.findIndex((r) => r.dni === meta.dni);
    if (idx >= 0) {
      items[idx] = { ...items[idx], lat, lng, updatedAt: new Date().toISOString() };
      localStorage.setItem('severo_padron', JSON.stringify(items));
    }
  },

  // ── API ───────────────────────────────────────────────────────────────────

  async _fetchSheet(sheetName) {
    if (this._cache[sheetName]) return this._cache[sheetName];
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(sheetName)}${this._apiKeyParam()}`;
    console.log('[Padron] GET', sheetName, url.replace(/key=[^&]+/, 'key=…'));
    const res = await fetch(url);
    console.log('[Padron] status', res.status, sheetName);
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(`Padrón API ${res.status}: ${body.error?.message || sheetName}`);
    }
    const rows = (await res.json()).values || [];
    this._cache[sheetName] = rows;
    return rows;
  },

  _rowToPadronRecord(row, rowIdx) {
    // A=DNI(0)  B=SEXO(1)  C=TIPO(2)
    // D–L = participación electoral (3–11)
    // M=TIPO_DNI(12)  N=APELLIDO Y NOMBRE(13)  O=CLASE(14)  P=DOMICILIO(15)
    // Q=LATITUD(16)   R=LONGITUD(17)            S=DOMICILIO REAL(18)
    // T=PROFESION(19) U=CIRCUITO(20)  V=NRO_MESA(21)  W=ORDEN(22)  X=ESTABLECIMIENTO(23)
    // Y=ocupacion(24) Z=nivel_educativo(25)
    // AA=ESTADO CIVIL(26)  AB=AFILIACION(27)  AC=LOCALIDAD(28)
    // AD=EMPLEADOR1(29)  AE=EMPLEADOR2(30)  AF=EMPLEADOR3(31)
    // AG=REGIMEN_IMP(32)  AH=CELULAR1(33)  AI=CELULAR2(34)
    // AJ=EMAIL1(35)  AK=EMAIL2(36)  AL=AUH(37)  AM=IFE(38)  AN=TWITTER(39)
    return {
      dni:            String(row[0]  || '').trim(),
      sexo:           row[1]  || '',
      tipo:           row[2]  || '',
      elec_2025_sep:  row[3]  || '',
      elec_2025_oct:  row[4]  || '',
      elec_2023_paso: row[5]  || '',
      elec_2023_gen:  row[6]  || '',
      elec_2023_bal:  row[7]  || '',
      elec_2021_paso: row[8]  || '',
      elec_2021_gen:  row[9]  || '',
      elec_2019_paso: row[10] || '',
      elec_2019_gen:  row[11] || '',
      tipo_dni:       row[12] || '',
      apellido:       this._titleCase(row[13] || ''),
      clase:          row[14] || '',
      domicilio:      this._titleCase(row[15] || ''),
      lat:            row[16] || '',
      lng:            row[17] || '',
      domicilio_real: this._titleCase(row[18] || ''),
      profesion:      this._titleCase(row[19] || ''),
      circuito:       row[20] || '',
      nro_mesa:       row[21] || '',
      orden:          row[22] || '',
      establecimiento:this._titleCase(row[23] || ''),
      ocupacion:      this._titleCase(row[24] || ''),
      nivel_educativo:row[25] || '',
      estado_civil:   row[26] || '',
      afiliacion:     row[27] || '',
      localidad:      row[28] || '',
      empleador1:     this._titleCase(row[29] || ''),
      empleador2:     this._titleCase(row[30] || ''),
      empleador3:     this._titleCase(row[31] || ''),
      regimen_imp:    row[32] || '',
      celular1:       row[33] || '',
      celular2:       row[34] || '',
      email1:         String(row[35] || '').toLowerCase(),
      email2:         String(row[36] || '').toLowerCase(),
      beneficiario_auh: row[37] || '',
      beneficiario_ife: row[38] || '',
      twitter:        row[39] || '',
      _meta: {
        coordRange:     `${CONFIG.SHEET_PADRON}!Q${rowIdx}:R${rowIdx}`,
        coordRangeFull: `${CONFIG.SHEET_PADRON}!Q${rowIdx}:S${rowIdx}`,
      },
    };
  },

  async _apiSearch(dni) {
    const dniStr = String(dni).trim();
    const rows = await this._fetchSheet(CONFIG.SHEET_PADRON);
    // fila 0 = encabezados; A=col 0 = DNI
    const i = rows.findIndex((r, idx) => idx > 0 && String(r[0] || '').trim() === dniStr);
    if (i <= 0) return null;
    return this._rowToPadronRecord(rows[i], i + 1);
  },

  async _apiSearchByApellido(query) {
    if (!query || query.length < 4) return [];
    const q = query.toLowerCase();
    const rows = await this._fetchSheet(CONFIG.SHEET_PADRON);
    const results = [];
    // fila 0 = encabezados; N=col 13 = APELLIDO Y NOMBRE
    rows.slice(1).forEach((row, i) => {
      if ((row[13] || '').toLowerCase().includes(q)) {
        results.push(this._rowToPadronRecord(row, i + 2));
      }
    });
    return results.slice(0, 15);
  },

  async _apiSearchByDomicilio(query) {
    if (!query || query.length < 4) return [];
    const q = query.toLowerCase();
    const rows = await this._fetchSheet(CONFIG.SHEET_PADRON);
    const results = [];
    // P=DOMICILIO = col 15
    rows.slice(1).forEach((row, i) => {
      if ((row[15] || '').toLowerCase().includes(q)) {
        results.push(this._rowToPadronRecord(row, i + 2));
      }
    });
    return results.slice(0, 15);
  },

  async _apiUpdateLatLng(meta, lat, lng, domicilioReal) {
    const token = localStorage.getItem('severo_access_token');
    if (!token) return;

    const useFullRange = !!(domicilioReal && meta.coordRangeFull);
    const range  = useFullRange ? meta.coordRangeFull : meta.coordRange;
    const values = useFullRange ? [[lat, lng, domicilioReal]] : [[lat, lng]];

    await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`,
      {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values }),
      }
    );
  },
};

const APP_VERSION = '2.7';

let _silentRefreshResolve = null;
let _silentRefreshReject   = null;

function initGoogleTokenClient() {
  if (!window.google?.accounts?.oauth2) return;
  const id = CONFIG.GOOGLE_CLIENT_ID;
  if (!id || id === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') return;

  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: id,
    scope: 'openid email profile https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/devstorage.read_write',
    callback: async (tokenResponse) => {
      if (_silentRefreshResolve) {
        const resolve = _silentRefreshResolve;
        const reject  = _silentRefreshReject;
        _silentRefreshResolve = null;
        _silentRefreshReject  = null;
        if (tokenResponse.error) return reject(new Error(tokenResponse.error));
        localStorage.setItem('severo_access_token', tokenResponse.access_token);
        localStorage.setItem('severo_token_expiry', String(Date.now() + 55 * 60 * 1000));
        return resolve(tokenResponse.access_token);
      }
      if (tokenResponse.error) return;
      try {
        const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
          { headers: { Authorization: `Bearer ${tokenResponse.access_token}` } });
        if (res.ok) {
          const info = await res.json();
          const user = Auth.handleGoogleToken(tokenResponse.access_token, info);
          go('home', { user });
        }
      } catch (e) {
        console.error('Error al obtener datos del usuario:', e);
      }
    },
  });
}

function googleLogin() {
  if (_tokenClient) _tokenClient.requestAccessToken({ prompt: '' });
}

function ensureFreshToken() {
  return new Promise((resolve, reject) => {
    if (!_tokenClient) return reject(new Error('Cliente OAuth no disponible'));
    _silentRefreshResolve = resolve;
    _silentRefreshReject  = reject;
    _tokenClient.requestAccessToken({ prompt: '' });
    setTimeout(() => {
      if (_silentRefreshResolve) {
        _silentRefreshResolve = null;
        _silentRefreshReject  = null;
        reject(new Error('Timeout al renovar sesión. Volvé a ingresar'));
      }
    }, 15000);
  });
}

window.addEventListener('load', () => { if (!_tokenClient) initGoogleTokenClient(); });

function _isTokenNearExpiry() {
  const expiry = parseInt(localStorage.getItem('severo_token_expiry') || '0', 10);
  return !expiry || Date.now() >= expiry - 5 * 60 * 1000;
}

async function ensureFreshTokenIfNeeded() {
  if (!SheetsDB._hasToken()) return;
  if (!_isTokenNearExpiry()) return;
  try { await ensureFreshToken(); } catch (_) {}
}

async function withTokenRetry(fn) {
  try { return await fn(); }
  catch (err) {
    if (!String(err.message).includes('401')) throw err;
    await ensureFreshToken();
    return fn();
  }
}

async function checkForUpdate() {
  try {

    if (!res.ok) return;
    const data = await res.json();
    if (data.version && data.version !== APP_VERSION) _showForceUpdateOverlay();

}

function _showForceUpdateOverlay() {
  if (document.getElementById('_forceUpdateOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = '_forceUpdateOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(13,71,161,0.92);z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px;';
  overlay.innerHTML = `

      <div style="font-size:2.4rem;margin-bottom:12px;">🔄</div>
      <h2 style="margin:0 0 8px;font-size:1.15rem;color:#0D47A1;font-weight:700;">Nueva versión disponible</h2>
      <p style="margin:0 0 28px;color:#555;font-size:0.92rem;line-height:1.5;">Hay una actualización disponible. Recargá para continuar.</p>
      <button id="_forceUpdateBtn" style="background:#0D47A1;color:#fff;border:none;padding:14px 0;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;width:100%;">Actualizar ahora</button>
    </div>`;
  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';
  document.getElementById('_forceUpdateBtn').addEventListener('click', async () => {
    document.getElementById('_forceUpdateBtn').textContent = 'Actualizando…';
    try {
      // Desregistrar todos los SW — la próxima carga no pasa por ningún SW
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map((r) => r.unregister()));
      // Borrar todos los cachés
      const keys = await caches.keys();
      await Promise.all(keys.map((k) => caches.delete(k)));
    } catch (_) {}
    // Parámetro único fuerza descarga fresca sin caché HTTP del browser
    window.location.href = window.location.pathname + '?_v=' + Date.now();
  });
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (Auth.isLoggedIn()) ensureFreshTokenIfNeeded();
    checkForUpdate();

});

// ── PWA: Install card + Update modal ────────────────────────────────────────

function _pwaIsStandalone() {
  return window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
}
function _pwaIsIOS() {
  return /iPhone|iPad|iPod/i.test(navigator.userAgent) && !window.MSStream;
}
function _pwaShouldShowInstall() {
  if (_pwaIsStandalone()) return false;
  if (localStorage.getItem('pwa_installed')) return false;
  const dismissed = localStorage.getItem('pwa_install_dismissed_at');
  const count = Number(localStorage.getItem('pwa_install_dismiss_count') || 0);
  if (count >= 2) return false;
  if (dismissed) {
    const daysSince = (Date.now() - Number(dismissed)) / 86_400_000;
    if (daysSince < 3) return false;
  }
  return true;
}
function _pwaInstallCard() {
  if (!_pwaShouldShowInstall()) return '';
  if (_pwaIsIOS()) {
    return `
      <div class="pwa-install-card" id="pwaInstallCard">
        <div class="pwa-install-icon">📲</div>
        <div class="pwa-install-text">
          <strong>Instalá Proyecto Severo</strong>
          <span>Tocá <strong>Compartir</strong> (⬆) y luego<br>"Agregar a pantalla de inicio"</span>
        </div>
        <button class="pwa-install-dismiss" onclick="pwaInstallDismiss()" aria-label="Cerrar">×</button>
      </div>`;
  }
  if (window._deferredInstallPrompt) {
    return `
      <div class="pwa-install-card" id="pwaInstallCard">
        <div class="pwa-install-icon">📲</div>
        <div class="pwa-install-text">
          <strong>Instalá Proyecto Severo</strong>
          <span>Accedé más rápido, funciona sin conexión</span>
        </div>
        <button class="btn btn-primary pwa-install-btn" onclick="pwaInstallNow()">Instalar</button>
        <button class="pwa-install-dismiss" onclick="pwaInstallDismiss()" aria-label="Cerrar">×</button>
      </div>`;
  }
  return '';
}
async function pwaInstallNow() {
  const prompt = window._deferredInstallPrompt;
  if (!prompt) return;
  prompt.prompt();
  const { outcome } = await prompt.userChoice;
  window._deferredInstallPrompt = null;
  if (outcome === 'accepted') {
    localStorage.setItem('pwa_installed', '1');
  } else {
    pwaInstallDismiss();
  }
  const card = document.getElementById('pwaInstallCard');
  if (card) card.remove();
}
function pwaInstallDismiss() {
  localStorage.setItem('pwa_install_dismissed_at', String(Date.now()));
  const count = Number(localStorage.getItem('pwa_install_dismiss_count') || 0);
  localStorage.setItem('pwa_install_dismiss_count', String(count + 1));
  const card = document.getElementById('pwaInstallCard');
  if (card) card.remove();
}
window._pwaRenderInstallCard = () => {
  const card = document.getElementById('pwaInstallCard');
  if (!card && _pwaShouldShowInstall() && !_pwaIsIOS()) {
    const home = document.querySelector('.home-actions');
    if (home) home.insertAdjacentHTML('beforebegin', _pwaInstallCard());
  }
};
window._pwaHideInstallCard = () => {
  const card = document.getElementById('pwaInstallCard');
  if (card) card.remove();
};
let _pwaWaitingWorker = null;
window._pwaShowUpdateModal = (worker) => {
  _pwaWaitingWorker = worker;
  if (document.getElementById('pwaUpdateModal')) return;
  const modal = document.createElement('div');
  modal.id = 'pwaUpdateModal';
  modal.className = 'pwa-update-modal';
  document.body.style.overflow = 'hidden';
  modal.addEventListener('click', (e) => e.stopPropagation());
  modal.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') e.preventDefault(); }, { capture: true });
  modal.innerHTML = `
    <div class="pwa-update-box">
      <div class="pwa-update-icon">🔄</div>
      <h2 class="pwa-update-title">Nueva versión disponible</h2>
      <p class="pwa-update-body">
        Se publicó una actualización.<br>
        La app se recarga para aplicarla.
      </p>
      <button class="btn btn-primary btn-block pwa-update-btn" id="pwaUpdateBtn">
        Actualizar ahora
      </button>
      <p class="pwa-update-hint">Tus encuestas guardadas no se pierden.</p>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('pwaUpdateBtn').addEventListener('click', () => {
    document.getElementById('pwaUpdateBtn').textContent = 'Actualizando…';
    document.getElementById('pwaUpdateBtn').disabled = true;
    if (_pwaWaitingWorker) {
      _pwaWaitingWorker.postMessage({ type: 'SKIP_WAITING' });
    } else {
      window.location.reload();
    }
  });
};

function avatar(user) {

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit' });
}

function typeLabel(type) {
  if (type === 'ciudadano')        return 'Ciudadano';
  if (type === 'sociohabitacional') return 'Socio-habitacional';

// ── Helpers de visibilidad condicional ───────────────────────────────────────

function isVisible(q) {
  return !q.showIf || q.showIf(State.answers);
}

function nextVisibleIdx(from, questions) {
  let idx = from + 1;
  while (idx < questions.length && !isVisible(questions[idx])) idx++;
  return idx;
}

function prevVisibleIdx(from, questions) {
  let idx = from - 1;
  while (idx >= 0 && !isVisible(questions[idx])) idx--;
  return idx;
}

function visibleQuestions(questions) {
  return questions.filter(isVisible);
}

function visiblePosition(questions, currentIdx) {
  return questions.slice(0, currentIdx + 1).filter(isVisible).length;
}
