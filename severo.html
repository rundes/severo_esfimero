  <title>Severo — Relevamientos</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
/* ── Variables ──────────────────────────────────────────────────────────────── */
:root {
  --primary:      #1565C0;
  --primary-dark: #0D47A1;
  --primary-light:#E3F2FD;
  --accent:       #00897B;
  --bg:           #F4F6F9;
  --surface:      #FFFFFF;
  --border:       #DDE1E7;
  --text:         #1A1A2E;
  --text-2:       #5C6677;
  --error:        #C62828;
  --success:      #2E7D32;
  --warn:         #E65100;
  --radius:       12px;
  --shadow:       0 2px 12px rgba(0,0,0,.08);
  --transition:   .18s ease;
}

/* ── Reset ──────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
}

.screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.screen-center {
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 32px;
}

/* ── Header ─────────────────────────────────────────────────────────────────── */
.app-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--primary);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 10;
  min-height: 56px;
}

.header-title {
  flex: 1;
  font-weight: 600;
  font-size: 1rem;
}

.header-count {
  font-size: .85rem;
  opacity: .8;
}

.btn-icon {
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  font-size: 1.1rem;
  padding: 6px;
  border-radius: 6px;
  min-width: 36px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-icon:hover { background: rgba(255,255,255,.15); }

/* ── Progress bar ───────────────────────────────────────────────────────────── */
.progress-bar {
  height: 4px;
  background: var(--border);
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  transition: width .3s ease;
}

/* ── Buttons ────────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: var(--radius);
  padding: 14px 24px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  min-height: 48px;
  text-decoration: none;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover { background: var(--primary-dark); }

.btn-outline {
  background: transparent;
  color: var(--primary);
  border: 2px solid var(--primary);
}
.btn-outline:hover { background: var(--primary-light); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
}
.btn-ghost:hover { background: var(--border); }

.btn-block { width: 100%; }

.btn-mock {
  background: var(--surface);
  color: var(--primary);
  border: 2px solid var(--border);
  width: 100%;
}
.btn-mock:hover { border-color: var(--primary); background: var(--primary-light); }

/* ── Auth screen ────────────────────────────────────────────────────────────── */
.screen-auth {
  background: var(--primary);
  justify-content: center;
  padding: 32px 24px;
  gap: 0;
}

.auth-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
  color: #fff;
}

.logo-mark {
  width: 72px;
  height: 72px;
  background: rgba(255,255,255,.2);
  border: 3px solid rgba(255,255,255,.5);
  border-radius: 20px;
  font-size: 2rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  margin-bottom: 16px;
}

.logo-img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  margin-bottom: 16px;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.25));
}

.logo-title {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -.5px;
}

.logo-sub {
  opacity: .8;
  margin-top: 4px;
}

.auth-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow);
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-2);
  font-size: .85rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Home screen ────────────────────────────────────────────────────────────── */
.home-user {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
}

.avatar-initials {
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: .95rem;
}

.user-name { font-weight: 600; }
.user-email { font-size: .85rem; color: var(--text-2); }

.home-actions {
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Geo screen ─────────────────────────────────────────────────────────────── */
.geo-status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: .88rem;
  color: var(--text-2);
  min-height: 40px;
}

.geo-spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

.geo-map {
  flex: 1;
  min-height: 0;
  z-index: 1;
}

.geo-footer {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.geo-coords {
  font-size: .8rem;
  color: var(--text-2);
  font-family: monospace;
  text-align: center;
  min-height: 1.2em;
}

.geo-actions {
  display: flex;
  gap: 10px;
}
.geo-actions .btn-primary { flex: 1; }

/* ── Type select ────────────────────────────────────────────────────────────── */
.type-loc {
  padding: 10px 16px;
  font-size: .85rem;
  color: var(--text-2);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.type-cards {
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.type-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: left;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.type-card:hover {
  border-color: var(--primary);
  background: var(--primary-light);
}
.type-card-icon { font-size: 2rem; }
.type-card-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
.type-card-desc  { font-size: .9rem; color: var(--text-2); line-height: 1.4; }

/* ── Block header ───────────────────────────────────────────────────────────── */
.block-header {
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  padding: 8px 16px;
  border-bottom: 1px solid #BBDEFB;
}

/* ── Survey screen ──────────────────────────────────────────────────────────── */
.survey-body {
  flex: 1;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
}

.question-label {
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1.4;
  display: block;
}

.required { color: var(--error); margin-left: 4px; }

.padron-badge {
  display: inline-block;
  margin-left: 8px;
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  color: var(--accent);
  background: #E0F2F1;
  border: 1px solid #80CBC4;
  border-radius: 4px;
  padding: 1px 6px;
  vertical-align: middle;
}

.question-hint {
  font-size: .85rem;
  color: var(--text-2);
  background: #FFF8E1;
  border-left: 3px solid #FFB300;
  padding: 8px 12px;
  border-radius: 0 6px 6px 0;
  line-height: 1.4;
}

.question-input { display: flex; flex-direction: column; gap: 8px; }

.input {
  width: 100%;
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 1rem;
  color: var(--text);
  background: var(--surface);
  transition: var(--transition);
  font-family: inherit;
}
.input:focus { outline: none; border-color: var(--primary); }

.textarea { resize: vertical; min-height: 96px; }

/* Scale */
.scale-row {
  display: flex;
  gap: 8px;
}
.scale-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 4px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  transition: var(--transition);
}
.scale-btn:hover   { border-color: var(--primary); background: var(--primary-light); }
.scale-btn.active  { border-color: var(--primary); background: var(--primary); color: #fff; }
.scale-num { font-size: 1.1rem; font-weight: 700; }
.scale-lbl { font-size: .6rem; text-align: center; line-height: 1.2; }

/* Chips */
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 8px 14px;
  border: 2px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  cursor: pointer;
  font-size: .9rem;
  transition: var(--transition);
  color: var(--text);
}
.chip:hover  { border-color: var(--primary); background: var(--primary-light); }
.chip.active { border-color: var(--primary); background: var(--primary); color: #fff; }

/* Radio */
.radio-group { display: flex; flex-direction: column; gap: 8px; }
.radio-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  transition: var(--transition);
  font-size: .95rem;
}
.radio-option input[type=radio] { margin-top: 2px; accent-color: var(--primary); }
.radio-option:hover  { border-color: var(--primary); background: var(--primary-light); }
.radio-option.active { border-color: var(--primary); background: var(--primary-light); }

.survey-footer {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  position: sticky;
  bottom: 0;
}
.survey-footer .btn-primary { flex: 1; }

/* ── Summary ────────────────────────────────────────────────────────────────── */
.summary-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.summary-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-size: .9rem;
  color: var(--text-2);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.loc-link { color: var(--primary); text-decoration: none; }
.loc-link:hover { text-decoration: underline; }

.summary-table { width: 100%; border-collapse: collapse; }
.summary-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
.summary-label { color: var(--text-2); font-size: .85rem; width: 40%; }
.summary-value { font-size: .95rem; font-weight: 500; }

/* ── Saving / Done ──────────────────────────────────────────────────────────── */
.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.done-icon   { font-size: 3.5rem; }
.done-sub    { color: var(--text-2); }
.done-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 16px; }

/* ── List ───────────────────────────────────────────────────────────────────── */
.list-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

.survey-card {
  display: flex;
  gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: var(--transition);
}
.survey-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }

.card-icon  { font-size: 1.8rem; }
.card-body  { flex: 1; min-width: 0; }
.card-type  { font-weight: 700; font-size: .85rem; color: var(--primary); text-transform: uppercase; letter-spacing: .5px; }
.card-preview { font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-date  { font-size: .8rem; color: var(--text-2); margin-top: 4px; }
.card-loc   { font-size: .75rem; color: var(--text-2); font-family: monospace; }

/* ── Toast ──────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: .9rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s, transform .2s;
  white-space: nowrap;
  z-index: 100;
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Utilities ──────────────────────────────────────────────────────────────── */
.hint {
  font-size: .82rem;
  color: var(--text-2);
  text-align: center;
  padding: 8px 16px;
}
.center { text-align: center; }
.loading-init {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  color: var(--text-2);
}

/* ── Citizen Search ──────────────────────────────────────────────────────────── */
.search-group { display: flex; flex-direction: column; gap: 8px; }

.search-divider {
  text-align: center;
  font-size: .82rem;
  color: var(--text-2);
  padding: 2px 0;
}

.search-status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 20px 16px;
  color: var(--text-2);
  font-size: .9rem;
}

.citizen-results { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

.citizen-result {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: var(--transition);
}
.citizen-result:hover { border-color: var(--primary); background: var(--primary-light); }

.citizen-result-name { font-weight: 700; font-size: 1rem; color: var(--text); }
.citizen-result-info { font-size: .82rem; color: var(--text-2); margin-top: 3px; }

.google-login-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 44px;
  justify-content: center;
}

.google-not-configured {
  font-size: .78rem;
  color: var(--warn);
  text-align: center;
  padding: 4px 0 0;
}

.btn-google {
  background: #fff;
  border: 1px solid #dadce0;
  color: #3c4043;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  font-size: .95rem;
  font-weight: 500;
  border-radius: 4px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.btn-google:hover { background: #f8f9fa; border-color: #c6c6c6; }

  </style>
</head>

  <script>
const Geo = {
  async getLocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('El navegador no soporta geolocalización'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: Math.round(pos.coords.accuracy),
        }),
        (err) => {
          const msgs = {
            1: 'Permiso de ubicación denegado',
            2: 'Ubicación no disponible',
            3: 'Tiempo de espera agotado',
          };
          reject(new Error(msgs[err.code] || 'Error al obtener ubicación'));
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
      );
    });
  },

  format(location) {
    if (!location) return 'Sin ubicación';
    return `${location.lat.toFixed(6)}, ${location.lng.toFixed(6)} (±${location.accuracy}m)`;
  },

  mapsUrl(location) {
    if (!location) return null;
    return `https://www.google.com/maps?q=${location.lat},${location.lng}`;
  },

  async reverseGeocode(lat, lng) {
    if (!CONFIG.GOOGLE_API_KEY) return null;
    try {
      const res = await fetch(
        `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${CONFIG.GOOGLE_API_KEY}&language=es&result_type=street_address`
      );
      if (!res.ok) return null;
      const data = await res.json();
      if (data.status === 'OK' && data.results?.[0]) {
        return data.results[0].formatted_address;
      }
    } catch {}
    return null;
  },
};

  <script>
const SheetsDB = {
  _hasToken() {
    return !!localStorage.getItem('severo_access_token');
  },

  async save(type, record) {
    if (!this._hasToken()) return this._mockSave(type, record);
    return this._apiAppend(type, record);
  },

  getAll(type) {
    return this._mockGetAll(type);
  },

  async getAllAsync(type) {
    if (!this._hasToken()) return this._mockGetAll(type);
    return this._apiGetAll(type);
  },

  async update(type, id, updates) {
    return this._mockUpdate(type, id, updates);
  },

  // ── Mock (localStorage) ──────────────────────────────────────────────────

  _mockSave(type, record) {
    const key = `severo_${type}`;
    const items = JSON.parse(localStorage.getItem(key) || '[]');
    const saved = { ...record, id: Date.now(), savedAt: new Date().toISOString() };
    items.unshift(saved);
    localStorage.setItem(key, JSON.stringify(items));
    return saved;
  },

  _mockGetAll(type) {
    const key = `severo_${type}`;
    return JSON.parse(localStorage.getItem(key) || '[]');
  },

  _mockUpdate(type, id, updates) {
    const key = `severo_${type}`;
    const items = JSON.parse(localStorage.getItem(key) || '[]');
    const idx = items.findIndex((i) => i.id === id);
    if (idx >= 0) {
      items[idx] = { ...items[idx], ...updates, updatedAt: new Date().toISOString() };
      localStorage.setItem(key, JSON.stringify(items));
    }
  },

  // ── Google Sheets API ────────────────────────────────────────────────────

  _sheetForType(type) {
    if (type === 'ciudadano')        return CONFIG.SHEET_CIUDADANOS;
    if (type === 'sociohabitacional') return CONFIG.SHEET_SOCIOHABITACIONAL;
    return CONFIG.SHEET_PROBLEMATICAS;
  },

  async _apiAppend(type, record) {
    const sheet = this._sheetForType(type);
    const token = this._getToken();
    const row = this._toRow(type, record);

    console.log('[SheetsDB] guardando en pestaña:', sheet);
    console.log('[SheetsDB] fila:', row);

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${encodeURIComponent(sheet)}!A1:append?valueInputOption=USER_ENTERED`;

    const doAppend = () => fetch(url, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [row] }),
    });

    let res = await doAppend();
    console.log('[SheetsDB] append status:', res.status);

    if (res.status === 400 || res.status === 404) {
      console.log('[SheetsDB] pestaña no encontrada, creando:', sheet);
      const createRes = await this._createSheet(CONFIG.SURVEY_SPREADSHEET_ID, sheet, token);
      console.log('[SheetsDB] createSheet status:', createRes.status);
      await new Promise((r) => setTimeout(r, 800));
      res = await doAppend();
      console.log('[SheetsDB] retry status:', res.status);
    }

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      console.error('[SheetsDB] error body:', errBody);
      throw new Error(`Sheets API ${res.status}: ${errBody.error?.message || JSON.stringify(errBody)}`);
    }
    return record;
  },

  async _createSheet(spreadsheetId, sheetName, token) {
    return fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`,
      {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{ addSheet: { properties: { title: sheetName } } }],
        }),
      }
    );
  },

  async _apiGetAll(type) {
    const sheet = this._sheetForType(type);
    const token = this._getToken();

    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SURVEY_SPREADSHEET_ID}/values/${sheet}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!res.ok) throw new Error(`Sheets API error: ${res.status}`);
    const data = await res.json();
    return this._fromRows(type, data.values || []);
  },

  _getToken() {
    const t = localStorage.getItem('severo_access_token');
    if (!t) throw new Error('Sin token de acceso. Reautenticar con scope de Sheets.');
    return t;
  },

  _toRow(type, r) {
    const base = [
      r.id || '',
      r.savedAt || new Date().toISOString(),
      r.operador?.email || '',
      r.operador?.name || '',
      r.location?.lat || '',
      r.location?.lng || '',
      r.location?.accuracy || '',
    ];
    if (type === 'ciudadano') {
      const a = r.answers || {};
      return [...base, a.dni || '', a.apellido || '', a.nombre || '', a.domicilio || '',
        a.edad || '', a.residencia || '', a.calidad_vida || '',
        (a.problemas || []).join(', '), a.mejoras || '', a.comentarios || ''];
    }
    if (type === 'sociohabitacional') {
      const a = r.answers || {};
      return [...base, a.dni || '', a.apellido || '', a.nombre || '', a.domicilio || '',
        a.barrio || '', a.personas_total || '', a.personas_menores || '',
        a.personas_mayores65 || '', a.familias || '', a.tenencia || '',
        a.escritura || '', a.cuotas_adeuda || '', a.tipo_vivienda || '',
        a.material_paredes || '', a.ambientes_dormir || '', a.desague || '',
        a.agua_potable || '', a.electricidad || '', a.gas || '',
        a.discapacidad || '', (a.tipo_discapacidad || []).join(', '), a.cud || '',
        (a.actividades_menores || []).join(', '), (a.actividades_adultos || []).join(', '),
        (a.actividades_mayores || []).join(', '), a.mejora_barrio || '',
        a.mejora_municipio || '', a.falta_maipu || '', a.voto || ''];
    }
    const a = r.answers || {};
    return [...base, a.categoria || '', a.direccion || '', a.descripcion || '',
      a.urgencia || '', a.afecta_transito || '', a.observaciones || ''];
  },

  _fromRows(type, rows) {
    return rows.slice(1).map((row) => {
      const base = { id: row[0], savedAt: row[1], operador: { email: row[2], name: row[3] },
        location: { lat: parseFloat(row[4]), lng: parseFloat(row[5]), accuracy: parseInt(row[6]) } };
      if (type === 'ciudadano') {
        return { ...base, answers: { dni: row[7], apellido: row[8], nombre: row[9],
          domicilio: row[10], edad: row[11], residencia: row[12],
          calidad_vida: row[13], problemas: row[14] ? row[14].split(', ') : [],
          mejoras: row[15], comentarios: row[16] } };
      }
      return { ...base, answers: { categoria: row[7], direccion: row[8], descripcion: row[9],
        urgencia: row[10], afecta_transito: row[11], observaciones: row[12] } };
    });
  },
};

// ── Padrón electoral ─────────────────────────────────────────────────────────
// LECTURA: API Key de Google (no requiere token del relevador)
// ESCRITURA: token OAuth del relevador (debe tener acceso de edición al padrón)
//
// nativos:     A=TIPO_DOC, B=DOCUMENTO, D=APELLIDO Y NOMBRE, F=DOMICILIO,
//              G=LATITUD, H=LONGITUD, I=DOMICILIO REAL
// extranjeros: A=DOCUMENTO, C=APELLIDO Y NOMBRE, E=DOMICILIO,
//              F=LATITUD, G=LONGITUD, H=DOMICILIO REAL

const Padron = {
  _cache: {},

  _hasApiKey() { return !!CONFIG.GOOGLE_API_KEY; },

  _apiKeyParam() { return CONFIG.GOOGLE_API_KEY ? `?key=${CONFIG.GOOGLE_API_KEY}` : ''; },

  searchByDNI(dni) { return this._mockSearch(dni); },

  async searchByDNIAsync(dni) {
    if (!this._hasApiKey()) return this._mockSearch(dni);
    return this._apiSearch(dni);
  },

  async searchByApellidoAsync(query) {
    if (!this._hasApiKey()) return this._mockSearchByApellido(query);
    return this._apiSearchByApellido(query);
  },

  async updateLatLng(meta, lat, lng, domicilioReal) {
    if (!meta?.coordRange) return;
    const token = localStorage.getItem('severo_access_token');
    if (!token) return this._mockUpdateLatLng(meta, lat, lng);
    return this._apiUpdateLatLng(meta, lat, lng, domicilioReal);
  },

  async upsertByDNI(record) { return this._mockUpsert(record); },

  _titleCase(str) {
    if (!str) return '';
    return String(str).toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
  },

  // ── Mock ──────────────────────────────────────────────────────────────────

  _mockSearch(dni) {
    if (!dni) return null;
    const dniStr = String(dni).trim();
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    const found = items.find((r) => r.dni === dniStr);
    if (!found) return null;
    return { ...found, _meta: { dni: dniStr } };
  },

  _mockSearchByApellido(query) {
    if (!query || query.length < 4) return [];
    const q = query.toLowerCase();
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    return items
      .filter((r) => (r.apellido || '').toLowerCase().includes(q))
      .slice(0, 15)
      .map((r) => ({ ...r, _meta: { dni: r.dni } }));
  },

  _mockUpsert(record) {
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    const idx = items.findIndex((r) => r.dni === String(record.dni).trim());
    const updated = { ...record, updatedAt: new Date().toISOString() };
    if (idx >= 0) items[idx] = { ...items[idx], ...updated };
    else items.push(updated);
    localStorage.setItem('severo_padron', JSON.stringify(items));
    return updated;
  },

  _mockUpdateLatLng(meta, lat, lng) {
    if (!meta?.dni) return;
    const items = JSON.parse(localStorage.getItem('severo_padron') || '[]');
    const idx = items.findIndex((r) => r.dni === meta.dni);
    if (idx >= 0) {
      items[idx] = { ...items[idx], lat, lng, updatedAt: new Date().toISOString() };
      localStorage.setItem('severo_padron', JSON.stringify(items));
    }
  },

  // ── API ───────────────────────────────────────────────────────────────────

  async _fetchSheet(sheetName) {
    if (this._cache[sheetName]) return this._cache[sheetName];
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${sheetName}${this._apiKeyParam()}`
    );
    if (!res.ok) return [];
    const rows = (await res.json()).values || [];
    this._cache[sheetName] = rows;
    return rows;
  },

  async _apiSearch(dni) {
    const dniStr = String(dni).trim();

    const nRows = await this._fetchSheet(CONFIG.SHEET_PADRON_NATIVOS);
    const iN = nRows.findIndex((r, idx) => idx > 0 && String(r[1] || '').trim() === dniStr);
    if (iN > 0) {
      return {
        apellido:  this._titleCase(nRows[iN][3] || ''),
        domicilio: this._titleCase(nRows[iN][5] || ''),
        dni:       dniStr,
        lat:       nRows[iN][6] || '',
        lng:       nRows[iN][7] || '',
        _meta: {
          coordRange:     `${CONFIG.SHEET_PADRON_NATIVOS}!G${iN + 1}:H${iN + 1}`,
          coordRangeFull: `${CONFIG.SHEET_PADRON_NATIVOS}!G${iN + 1}:I${iN + 1}`,
        },
      };
    }

    const eRows = await this._fetchSheet(CONFIG.SHEET_PADRON_EXTRANJEROS);
    const iE = eRows.findIndex((r, idx) => idx > 0 && String(r[0] || '').trim() === dniStr);
    if (iE > 0) {
      return {
        apellido:  this._titleCase(eRows[iE][2] || ''),
        domicilio: this._titleCase(eRows[iE][4] || ''),
        dni:       dniStr,
        lat:       eRows[iE][5] || '',
        lng:       eRows[iE][6] || '',
        _meta: {
          coordRange:     `${CONFIG.SHEET_PADRON_EXTRANJEROS}!F${iE + 1}:G${iE + 1}`,
          coordRangeFull: `${CONFIG.SHEET_PADRON_EXTRANJEROS}!F${iE + 1}:H${iE + 1}`,
        },
      };
    }

    return null;
  },

  async _apiSearchByApellido(query) {
    if (!query || query.length < 4) return [];
    const q = query.toLowerCase();
    const results = [];

    const nRows = await this._fetchSheet(CONFIG.SHEET_PADRON_NATIVOS);
    nRows.slice(1).forEach((row, i) => {
      const apellido = this._titleCase(row[3] || '');
      if (apellido.toLowerCase().includes(q)) {
        results.push({
          apellido,
          domicilio: this._titleCase(row[5] || ''),
          dni: String(row[1] || '').trim(),
          lat: row[6] || '',
          lng: row[7] || '',
          _meta: {
            coordRange:     `${CONFIG.SHEET_PADRON_NATIVOS}!G${i + 2}:H${i + 2}`,
            coordRangeFull: `${CONFIG.SHEET_PADRON_NATIVOS}!G${i + 2}:I${i + 2}`,
          },
        });
      }
    });

    const eRows = await this._fetchSheet(CONFIG.SHEET_PADRON_EXTRANJEROS);
    eRows.slice(1).forEach((row, i) => {
      const apellido = this._titleCase(row[2] || '');
      if (apellido.toLowerCase().includes(q)) {
        results.push({
          apellido,
          domicilio: this._titleCase(row[4] || ''),
          dni: String(row[0] || '').trim(),
          lat: row[5] || '',
          lng: row[6] || '',
          _meta: {
            coordRange:     `${CONFIG.SHEET_PADRON_EXTRANJEROS}!F${i + 2}:G${i + 2}`,
            coordRangeFull: `${CONFIG.SHEET_PADRON_EXTRANJEROS}!F${i + 2}:H${i + 2}`,
          },
        });
      }
    });

    return results.slice(0, 15);
  },

  async _apiUpdateLatLng(meta, lat, lng, domicilioReal) {
    const token = localStorage.getItem('severo_access_token');
    if (!token) return;

    const useFullRange = !!(domicilioReal && meta.coordRangeFull);
    const range  = useFullRange ? meta.coordRangeFull : meta.coordRange;
    const values = useFullRange ? [[lat, lng, domicilioReal]] : [[lat, lng]];

    await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`,
      {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values }),
      }
    );
  },
};

  </script>
  <script>
const Auth = {
  _user: null,

  init() {
    const saved = localStorage.getItem('severo_user');
    if (saved) {
      try { this._user = JSON.parse(saved); } catch (_) { this._user = null; }
    }
  },

  getUser() { return this._user; },
  isLoggedIn() { return !!this._user; },

  handleGoogleToken(accessToken, userInfo) {
    this._user = {
      name: userInfo.name,
      email: userInfo.email,
      picture: userInfo.picture || null,
    };
    localStorage.setItem('severo_user', JSON.stringify(this._user));
    localStorage.setItem('severo_access_token', accessToken);
    return this._user;
  },

  mockLogin() {
    this._user = {
      name: 'Operador Prueba',
      email: 'operador@municipio.gob.ar',
      picture: null,
      isMock: true,
    };
    localStorage.setItem('severo_user', JSON.stringify(this._user));
    return this._user;
  },

  logout() {
    const token = localStorage.getItem('severo_access_token');
    this._user = null;
    localStorage.removeItem('severo_user');
    localStorage.removeItem('severo_access_token');
    if (token && window.google?.accounts?.oauth2) {
      try { google.accounts.oauth2.revoke(token); } catch {}
    }
    if (window.google?.accounts?.id) {
      google.accounts.id.disableAutoSelect();
    }
  },
};

  <script>
// ── Mapa Leaflet (instancias globales) ───────────────────────────────────────

let _map = null;
let _marker = null;
let _searchDebounce = null;
let _tokenClient = null;

function initGoogleTokenClient() {
  if (!window.google?.accounts?.oauth2) return;
  const id = CONFIG.GOOGLE_CLIENT_ID;
  if (!id || id === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') return;

  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: id,
    scope: 'openid email profile https://www.googleapis.com/auth/spreadsheets',
    callback: async (tokenResponse) => {
      if (tokenResponse.error) return;
      try {
        const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
          { headers: { Authorization: `Bearer ${tokenResponse.access_token}` } });
        if (res.ok) {
          const info = await res.json();
          const user = Auth.handleGoogleToken(tokenResponse.access_token, info);
          go('home', { user });
        }
      } catch (e) {
        console.error('Error al obtener datos del usuario:', e);
      }
    },
  });
}

function googleLogin() {
  if (_tokenClient) _tokenClient.requestAccessToken({ prompt: '' });
}

window.addEventListener('load', () => { if (!_tokenClient) initGoogleTokenClient(); });

// ── Estado global ────────────────────────────────────────────────────────────

const State = {
  screen: 'auth',
  user: null,
  location: null,
  surveyType: null,   // 'ciudadano' | 'problematica' | 'sociohabitacional'
  answers: {},
  currentQ: 0,
  surveys: [],
  detailRecord: null,
  toast: null,
  padronLoaded: false,
  padronFilled: {},
  padronMeta:   null,
  // citizen search
  citizenSearchQuery: '',
  citizenDNIQuery: '',
  citizenSearchResults: [],
  citizenSearching: false,
};

// ── Entrada ──────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  Auth.init();
  if (Auth.isLoggedIn()) {
    go('home', { user: Auth.getUser() });
  } else {
    render();
  }
});


// ── Navegación ───────────────────────────────────────────────────────────────

function go(screen, updates = {}) {
  Object.assign(State, updates, { screen });
  render();
}

function render() {
  // Destruir el mapa Leaflet si salimos de la pantalla geo
  if (_map && State.screen !== 'geo') {
    _map.remove();
    _map = null;
    _marker = null;
  }

  const el = document.getElementById('app');
  const screens = {
    auth:          renderAuth,
    home:          renderHome,
    geo:           renderGeo,
    typeSelect:    renderTypeSelect,
    citizenSearch: renderCitizenSearch,
    survey:        renderSurvey,
    summary:       renderSummary,
    saving:        renderSaving,
    done:          renderDone,
    list:          renderList,
    detail:        renderDetail,
  };
  el.innerHTML = (screens[State.screen] || renderAuth)();
  bindEvents();
  if (State.screen === 'geo') startGeoCapture();
  if (State.screen === 'saving') doSave();
  if (State.screen === 'list') loadList();
  if (State.toast) showToast(State.toast);
}

// ── Utilidades UI ────────────────────────────────────────────────────────────

function avatar(user) {
  if (user?.picture) return `<img src="${user.picture}" class="avatar" alt="">`;
  const initials = (user?.name || '?').split(' ').map((w) => w[0]).join('').slice(0, 2).toUpperCase();
  return `<div class="avatar avatar-initials">${initials}</div>`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit' });
}

function typeLabel(type) {
  if (type === 'ciudadano')        return 'Ciudadano';
  if (type === 'sociohabitacional') return 'Socio-habitacional';
  return 'Problemática';
}

function typeIcon(type) {
  if (type === 'ciudadano')        return '🧑';
  if (type === 'sociohabitacional') return '🏠';
  return '⚠️';
}

// ── Helpers de visibilidad condicional ───────────────────────────────────────

function isVisible(q) {
  return !q.showIf || q.showIf(State.answers);
}

function nextVisibleIdx(from, questions) {
  let idx = from + 1;
  while (idx < questions.length && !isVisible(questions[idx])) idx++;
  return idx;
}

function prevVisibleIdx(from, questions) {
  let idx = from - 1;
  while (idx >= 0 && !isVisible(questions[idx])) idx--;
  return idx;
}

function visibleQuestions(questions) {
  return questions.filter(isVisible);
}

function visiblePosition(questions, currentIdx) {
  return questions.slice(0, currentIdx + 1).filter(isVisible).length;
}

// ── Pantallas ────────────────────────────────────────────────────────────────

function renderAuth() {
  const isConfigured = CONFIG.GOOGLE_CLIENT_ID !== 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

               Ingresar con Google

function renderHome() {

function renderGeo() {

}

async function startGeoCapture() {
  const statusEl  = document.getElementById('geoStatus');
  const spinnerEl = document.getElementById('geoSpinner');
  const coordsEl  = document.getElementById('geoCoords');
  const footerEl  = document.getElementById('geoFooter');

  // Coordenadas por defecto: Maipú, Mendoza
  const DEFAULT = { lat: -32.9817, lng: -68.7946 };

  function initMap(lat, lng) {
    _map = L.map('geoMap').setView([lat, lng], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 20,
    }).addTo(_map);

    _marker = L.marker([lat, lng], { draggable: true }).addTo(_map);

    const updateCoords = (latlng) => {
      coordsEl.textContent = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
    };

    _marker.on('drag', (e) => updateCoords(e.latlng));
    _marker.on('dragend', (e) => updateCoords(e.target.getLatLng()));

    // Tap/click en el mapa mueve el pin
    _map.on('click', (e) => {
      _marker.setLatLng(e.latlng);
      updateCoords(e.latlng);
    });

    updateCoords({ lat, lng });
    footerEl.style.display = 'block';
    setTimeout(() => _map.invalidateSize(), 100);
  }

  try {
    const loc = await Geo.getLocation();
    spinnerEl.style.display = 'none';
    statusEl.textContent = 'Arrastrá el pin o tocá el mapa para ajustar';
    initMap(loc.lat, loc.lng);
  } catch (err) {
    spinnerEl.style.display = 'none';
    statusEl.textContent = `${err.message} — ajustá el pin manualmente`;
    initMap(DEFAULT.lat, DEFAULT.lng);
  }
}

async function confirmGeo() {
  if (_marker) {
    const pos = _marker.getLatLng();
    State.location = { lat: pos.lat, lng: pos.lng, accuracy: 0 };
    if (State.surveyType !== 'problematica') {
      State.domicilioReal = await Geo.reverseGeocode(pos.lat, pos.lng);
    }
  }
  go('survey');
}

function skipGeo() {
  State.location = null;
  go('survey');
}

function renderTypeSelect() {

    <div class="screen">

      <div class="type-cards">

function selectType(type) {
  const base = { surveyType: type, currentQ: 0, answers: {}, padronLoaded: false, padronFilled: {}, padronMeta: null, location: null };
  if (type === 'ciudadano' || type === 'sociohabitacional') {
    go('citizenSearch', { ...base, citizenSearchQuery: '', citizenDNIQuery: '', citizenSearchResults: [], citizenSearching: false });
  } else {

}

// ── Citizen Search screen ────────────────────────────────────────────────────

function renderCitizenSearch() {
  return `
    <div class="screen">
      <header class="app-header">
        <button class="btn-icon" onclick="go('typeSelect')">←</button>
        <span class="header-title">🧑 Buscar en el padrón</span>
      </header>
      <div class="survey-body">
        <div class="search-group">
          <label class="question-label">Apellido y nombre</label>
          <input type="text" class="input" id="searchApellido"
            placeholder="Ingresá las primeras 4 letras…"
            value="${State.citizenSearchQuery || ''}"
            oninput="onCitizenSearchInput('apellido', this.value)"
            autocomplete="off">
        </div>
        <div class="search-divider">— o por número de documento —</div>
        <div class="search-group">
          <label class="question-label">DNI</label>
          <input type="text" inputmode="numeric" class="input" id="searchDNI"
            placeholder="Número de documento"
            value="${State.citizenDNIQuery || ''}"
            oninput="onCitizenSearchInput('dni', this.value)"
            autocomplete="off">
        </div>
        <div id="searchResults">${renderCitizenResults()}</div>
      </div>
      <div class="survey-footer">
        <button class="btn btn-ghost" onclick="selectCitizen(null)">Continuar sin buscar</button>
      </div>
    </div>`;
}

function renderCitizenResults() {
  if (State.citizenSearching) {
    return `<div class="search-status"><div class="geo-spinner"></div> Buscando en el padrón…</div>`;
  }
  const results = State.citizenSearchResults || [];
  if (!results.length) {
    const hasQuery = (State.citizenSearchQuery?.length >= 4) || (State.citizenDNIQuery?.length >= 6);
    return hasQuery ? `<div class="search-status">Sin resultados en el padrón</div>` : '';
  }
  return `<div class="citizen-results">
    ${results.map((r, i) => `
      <div class="citizen-result" onclick="selectCitizen(${i})">
        <div class="citizen-result-name">${r.apellido || '—'}</div>
        <div class="citizen-result-info">DNI: ${r.dni || '—'} · ${r.domicilio || 'Sin domicilio registrado'}</div>
      </div>`).join('')}
  </div>`;
}

function onCitizenSearchInput(field, value) {
  if (field === 'apellido') {
    State.citizenSearchQuery = value;
    State.citizenDNIQuery = '';
    const other = document.getElementById('searchDNI');
    if (other) other.value = '';
  } else {
    State.citizenDNIQuery = value;
    State.citizenSearchQuery = '';
    const other = document.getElementById('searchApellido');
    if (other) other.value = '';
  }

  clearTimeout(_searchDebounce);
  const minLen = field === 'apellido' ? 4 : 6;

  if (value.length >= minLen) {
    State.citizenSearching = true;
    State.citizenSearchResults = [];
    updateCitizenSearchUI();
    _searchDebounce = setTimeout(() => doCitizenSearch(field, value), 450);
  } else {
    State.citizenSearchResults = [];
    State.citizenSearching = false;
    updateCitizenSearchUI();
  }
}

function updateCitizenSearchUI() {
  const el = document.getElementById('searchResults');
  if (el) el.innerHTML = renderCitizenResults();
}

async function doCitizenSearch(field, value) {
  try {
    let results;
    if (field === 'dni') {
      const record = await Padron.searchByDNIAsync(value);
      results = record ? [record] : [];
    } else {
      results = await Padron.searchByApellidoAsync(value);
    }
    State.citizenSearchResults = results || [];
    State.citizenSearching = false;
  } catch {
    State.citizenSearchResults = [];
    State.citizenSearching = false;
  }
  updateCitizenSearchUI();
}

function selectCitizen(idx) {
  const record = (idx !== null && State.citizenSearchResults?.[idx]) ? State.citizenSearchResults[idx] : null;
  const questions = PREGUNTAS[State.surveyType] || [];
  const answers = {};
  const padronFilled = {};

  if (record) {
    questions.forEach((q) => {
      if (q.padronKey && record.dni) {
        answers[q.id] = record.dni;
        padronFilled[q.id] = true;
      } else if (q.padronField && record[q.padronField]) {
        answers[q.id] = record[q.padronField];
        padronFilled[q.id] = true;
      }
    });
  }

  go('geo', {
    surveyType: State.surveyType,
    currentQ: 0,
    answers,
    location: null,
    padronLoaded: !!record,
    padronFilled,
    padronMeta: record?._meta || null,
    citizenSearchResults: [],
    citizenSearchQuery: '',
    citizenDNIQuery: '',
    citizenSearching: false,
  });
}

function renderSurvey() {
  const questions = PREGUNTAS[State.surveyType] || [];

  // Asegurar que la pregunta actual sea visible; si no, avanzar al siguiente visible
  if (questions[State.currentQ] && !isVisible(questions[State.currentQ])) {
    State.currentQ = nextVisibleIdx(State.currentQ - 1, questions);
  }

  const q = questions[State.currentQ];
  if (!q) { go('summary'); return ''; }

  const visible     = visibleQuestions(questions);
  const visPos      = visiblePosition(questions, State.currentQ);
  const visTotal    = visible.length;
  const progress    = ((visPos - 1) / visTotal) * 100;
  const isLast      = nextVisibleIdx(State.currentQ, questions) >= questions.length;
  const val         = State.answers[q.id];

  // Encabezado de bloque (cuando cambia respecto al anterior visible)
  const prevVisIdx  = prevVisibleIdx(State.currentQ, questions);
  const prevQ       = questions[prevVisIdx];
  const blockHeader = q.block && q.block !== prevQ?.block
    ? `<div class="block-header">${q.block}</div>`
    : '';

  return `
    <div class="screen">
      <header class="app-header">
        <button class="btn-icon" onclick="surveyBack()">←</button>
        <span class="header-title">${typeIcon(State.surveyType)} ${typeLabel(State.surveyType)}</span>
        <span class="header-count">${visPos}/${visTotal}</span>
      </header>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      ${blockHeader}
      <div class="survey-body">
        <label class="question-label">
          ${q.label}
          ${q.required ? '<span class="required">*</span>' : ''}
          ${(q.padronField || q.padronKey) && State.padronFilled[q.id] ? '<span class="padron-badge">padrón</span>' : ''}
        </label>
        ${q.hint ? `<p class="question-hint">${q.hint}</p>` : ''}
        <div class="question-input">
          ${renderInput(q, val)}
        </div>
      </div>
      <div class="survey-footer">
        ${!q.required ? `<button class="btn btn-ghost" onclick="surveyNext(true)">Omitir</button>` : ''}
        <button class="btn btn-primary" onclick="surveyNext(false)" id="btnNext">
          ${isLast ? 'Revisar' : 'Siguiente →'}
        </button>
      </div>
    </div>`;
}

function renderInput(q, val) {
  switch (q.type) {
    case 'text':
      return `<input type="text" class="input" id="q_${q.id}"
        value="${val || ''}" placeholder="${q.placeholder || ''}"
        oninput="saveAnswer('${q.id}', this.value)">`;

    case 'number':
      return `<input type="number" inputmode="numeric" class="input" id="q_${q.id}"
        value="${val || ''}" placeholder="0" min="0"
        oninput="saveAnswer('${q.id}', this.value)">`;

    case 'select':
      return `<select class="input" id="q_${q.id}" onchange="saveAnswer('${q.id}', this.value)">
        <option value="">Seleccionar…</option>
        ${q.options.map((o) => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}
      </select>`;

    case 'textarea':
      return `<textarea class="input textarea" id="q_${q.id}" rows="4"
        placeholder="${q.placeholder || ''}"
        oninput="saveAnswer('${q.id}', this.value)">${val || ''}</textarea>`;

    case 'scale': {
      const labels = q.labels || [];
      return `<div class="scale-row">
        ${[1,2,3,4,5].map((n) => `
          <button class="scale-btn ${val == n ? 'active' : ''}"
            onclick="saveAnswer('${q.id}', ${n}); render()">
            <span class="scale-num">${n}</span>
            <span class="scale-lbl">${labels[n-1] || ''}</span>
          </button>`).join('')}
      </div>`;
    }

    case 'checkbox': {
      const selected = Array.isArray(val) ? val : [];
      return `<div class="chip-group">
        ${q.options.map((o) => `
          <button class="chip ${selected.includes(o) ? 'active' : ''}"
            onclick="toggleChip('${q.id}', '${o}')">
            ${o}
          </button>`).join('')}
      </div>`;
    }

    case 'radio':
      return `<div class="radio-group">
        ${q.options.map((o) => `
          <label class="radio-option ${val === o.value ? 'active' : ''}">
            <input type="radio" name="q_${q.id}" value="${o.value}"
              ${val === o.value ? 'checked' : ''}
              onchange="saveAnswer('${q.id}', this.value); render()">
            <span>${o.label}</span>
          </label>`).join('')}
      </div>`;

    default:
      return '';
  }
}

function saveAnswer(id, value) {
  State.answers[id] = value;
}

function toggleChip(id, option) {
  const current = Array.isArray(State.answers[id]) ? State.answers[id] : [];
  const idx = current.indexOf(option);
  if (idx >= 0) current.splice(idx, 1);
  else current.push(option);
  State.answers[id] = [...current];
  render();
}

function surveyBack() {
  const questions = PREGUNTAS[State.surveyType] || [];
  const prev = prevVisibleIdx(State.currentQ, questions);
  if (prev < 0) {
    go('geo');
  } else {
    State.currentQ = prev;
    render();
  }
}

async function surveyNext(skip) {
  const questions = PREGUNTAS[State.surveyType] || [];
  const q = questions[State.currentQ];

  if (!skip && q.required) {
    const val = State.answers[q.id];
    const empty = val === undefined || val === null || val === '' ||
      (Array.isArray(val) && val.length === 0);
    if (empty) {
      showToast('Este campo es obligatorio');
      return;
    }
  }

  // Búsqueda en el padrón al salir del campo DNI
  if (!skip && q.padronKey && State.answers[q.id] && !State.padronLoaded) {
    await doPadronLookup(q, questions);
  }

  const next = nextVisibleIdx(State.currentQ, questions);
  if (next >= questions.length) {
    go('summary');
  } else {
    State.currentQ = next;
    render();
  }
}

async function doPadronLookup(dniQuestion, questions) {
  const dni = String(State.answers[dniQuestion.id]).trim();
  if (!dni) return;

  State.padronLoaded = true;

  let record;
  try {
    record = await Padron.searchByDNIAsync(dni);
  } catch {
    return;
  }

  if (!record) return; // ciudadano no encontrado en el padrón

  // Guardar meta para el update de lat/lng al guardar
  State.padronMeta = record._meta || null;

  // Pre-llenar campos mapeados que todavía no tienen respuesta
  let filled = 0;
  questions.forEach((q) => {
    if (q.padronField && record[q.padronField] !== undefined && !State.answers[q.id]) {
      State.answers[q.id] = record[q.padronField];
      State.padronFilled[q.id] = true;
      filled++;
    }
  });

  if (filled > 0) showToast('Datos del ciudadano cargados del padrón');
}

function renderSummary() {
  const questions = PREGUNTAS[State.surveyType] || [];
  const rows = questions.map((q) => {
    const val = State.answers[q.id];
    let display = '—';
    if (val !== undefined && val !== null && val !== '') {
      display = Array.isArray(val) ? val.join(', ') : String(val);
    }
    return `<tr>
      <td class="summary-label">${q.label}</td>
      <td class="summary-value">${display}</td>
    </tr>`;
  }).join('');

  return `
    <div class="screen">
      <header class="app-header">
        <button class="btn-icon" onclick="go('survey')">←</button>
        <span class="header-title">Resumen</span>
      </header>
      <div class="summary-body">
        <div class="summary-meta">
          <span>${typeIcon(State.surveyType)} ${typeLabel(State.surveyType)}</span>
          ${State.location ? `<a href="${Geo.mapsUrl(State.location)}" target="_blank" class="loc-link">📍 Ver en mapa</a>` : '<span>📍 Sin ubicación</span>'}
        </div>
        <table class="summary-table">${rows}</table>
      </div>
      <div class="survey-footer">
        <button class="btn btn-ghost" onclick="go('survey')">Editar</button>
        <button class="btn btn-primary" onclick="go('saving')">Guardar</button>
      </div>
    </div>`;
}

function renderSaving() {
  return `
    <div class="screen screen-center">
      <div class="spinner"></div>
      <p>Guardando…</p>
    </div>`;
}

async function doSave() {
  try {
    const record = {
      type: State.surveyType,
      operador: State.user,
      location: State.location,
      answers: { ...State.answers },
    };
    await SheetsDB.save(State.surveyType, record);

    // Actualizar el padrón si hay DNI, ubicación y meta (lat/lng + DOMICILIO REAL)
    const questions = PREGUNTAS[State.surveyType] || [];
    const dniQ = questions.find((q) => q.padronKey);
    if (dniQ && State.answers[dniQ.id] && State.location && State.padronMeta) {
      try {
        await Padron.updateLatLng(
          State.padronMeta,
          State.location.lat,
          State.location.lng,
          State.domicilioReal || null
        );
      } catch { /* no bloquea el guardado */ }
    }

    go('done');
  } catch (err) {
    go('summary');
    State.toast = 'Error al guardar: ' + err.message;
    render();
  }
}

function renderDone() {
  return `
    <div class="screen screen-center">
      <div class="done-icon">✅</div>
      <h2>Relevamiento guardado</h2>
      <p class="done-sub">${typeIcon(State.surveyType)} ${typeLabel(State.surveyType)}</p>
      <div class="done-actions">
        <button class="btn btn-primary btn-block" onclick="startNewSurvey()">+ Nuevo relevamiento</button>
        <button class="btn btn-outline btn-block" onclick="go('list')">Ver historial</button>
      </div>
    </div>`;
}

function renderList() {
  const ciudadanos      = SheetsDB.getAll('ciudadano');
  const problemas       = SheetsDB.getAll('problematica');
  const sociohabit      = SheetsDB.getAll('sociohabitacional');
  const all = [
    ...ciudadanos.map((r)   => ({...r, type: 'ciudadano'})),
    ...problemas.map((r)    => ({...r, type: 'problematica'})),
    ...sociohabit.map((r)   => ({...r, type: 'sociohabitacional'})),
  ];
  all.sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));

  const cards = all.length === 0
    ? `<p class="hint center">Todavía no hay relevamientos guardados.</p>`
    : all.map((r) => {
        const firstQ = PREGUNTAS[r.type]?.[0];
        const preview = firstQ ? (r.answers?.[firstQ.id] || '—') : '';
        return `
          <div class="survey-card" onclick="openDetail(${r.id}, '${r.type}')">
            <div class="card-icon">${typeIcon(r.type)}</div>
            <div class="card-body">
              <div class="card-type">${typeLabel(r.type)}</div>
              <div class="card-preview">${String(preview).slice(0, 60)}</div>
              <div class="card-date">${formatDate(r.savedAt)}</div>
              ${r.location ? `<div class="card-loc">📍 ${Geo.format(r.location)}</div>` : ''}
            </div>
          </div>`;
      }).join('');

  return `
    <div class="screen">
      <header class="app-header">
        <button class="btn-icon" onclick="go('home')">←</button>
        <span class="header-title">Historial</span>
        <span class="header-count">${all.length}</span>
      </header>
      <div class="list-body">${cards}</div>
    </div>`;
}

function openDetail(id, type) {
  const items = SheetsDB.getAll(type);
  const record = items.find((r) => r.id === id);
  if (record) go('detail', { detailRecord: { ...record, type } });
}

function renderDetail() {
  const r = State.detailRecord;
  if (!r) { go('list'); return ''; }
  const questions = PREGUNTAS[r.type] || [];

  const rows = questions.map((q) => {
    const val = r.answers?.[q.id];
    let display = '—';
    if (val !== undefined && val !== null && val !== '') {
      display = Array.isArray(val) ? val.join(', ') : String(val);
    }
    return `<tr>
      <td class="summary-label">${q.label}</td>
      <td class="summary-value">${display}</td>
    </tr>`;
  }).join('');

  return `
    <div class="screen">
      <header class="app-header">
        <button class="btn-icon" onclick="go('list')">←</button>
        <span class="header-title">${typeIcon(r.type)} ${typeLabel(r.type)}</span>
      </header>
      <div class="summary-body">
        <div class="summary-meta">
          <span>${formatDate(r.savedAt)}</span>
          <span>${r.operador?.name || ''}</span>
          ${r.location ? `<a href="${Geo.mapsUrl(r.location)}" target="_blank" class="loc-link">📍 Ver en mapa</a>` : '<span>Sin ubicación</span>'}
        </div>
        <table class="summary-table">${rows}</table>
      </div>
    </div>`;
}

// ── Eventos y utilidades ─────────────────────────────────────────────────────

function bindEvents() {
  // Los eventos están inline via onclick para simplicidad del prototipo
}

function showToast(msg) {
  State.toast = null;
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'toast';
    document.getElementById('app').appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 3000);
}
