  <!-- Leaflet CSS is only needed on the geo screen: load it off the critical path.
       integrity + crossorigin: Subresource Integrity contra compromiso del CDN.
       Hash sha384 calculado contra leaflet@1.9.4 (fijo, no rotativo). -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
        crossorigin="anonymous"
        media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
                  integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
                  crossorigin="anonymous"></noscript>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="loading-init" role="status" aria-label="Cargando la aplicación">
      <div class="loading-init-bar" aria-hidden="true">
        <div class="loading-init-bar-fill"></div>
      </div>
      <div class="loading-init-text">Cargando…</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
          crossorigin="anonymous"></script>
  <script>
    // Propaga ?_v= a todos los scripts locales para forzar descarga fresca.
    // Default = BUILD literal del release: en primera visita el browser
    // ve URLs nuevas por release y NO puede servir JS stale del HTTP/CDN
    // cache. Si la URL trae ?_v= (force-update overlay), gana ese valor.
    // BUMP_HERE: actualizar BUILD en cada release, junto con version.json.
    //
    // Scripts dinámicos: async=false fuerza ejecución en orden de inserción
    // (necesario porque app.js depende de config.js, sheets.js, etc.). Esto
    // reemplaza el document.write() previo (XSS-prone aunque BUILD sea
    // literal hardcoded; este patrón es más seguro y compatible con CSP).
    (function() {
      var BUILD = '2.9.5';
      var _v = new URLSearchParams(location.search).get('_v') || BUILD;
      var scripts = ['js/config.js','js/gcs.js','js/questions.js','js/geo.js',
                     'js/sheets.js','js/barrios.js','js/auth.js','js/app.js'];
      scripts.forEach(function(src) {
        var s = document.createElement('script');
        s.src = src + '?_v=' + encodeURIComponent(_v);
        s.async = false;
        document.head.appendChild(s);
      });
    })();
  </script>

  <script>
    // Boot watchdog: si .loading-init sigue visible tras 10s, el JS no
    // bootearon (SW colgado, scripts fallados, parse error).
    //
    // Estrategia escalonada (3 niveles), no un toggle ON/OFF:
    //   intento 1 → reload con cache-bust único (?_v=Date.now()).
    //   intento 2 → reload con cache-bust único.
    //   intento 3 → UI manual con botón "Limpiar y reintentar" que
    //               desregistra SW + borra todos los cachés antes de
    //               recargar. No reintento silencioso porque si dos
    //               recargas no resolvieron, el problema necesita
    //               intervención (el bug previo dejaba al usuario
    //               viendo la barra al 100% sin que pase nada).
    //
    // _bootAttempts vive en sessionStorage. render() en app.js lo limpia
    // al booter OK. Si pasan >2 min entre intentos, reseteamos
    // (asumimos que el usuario reabrió la app a propósito).
    setTimeout(function() {
      if (!document.querySelector('#app .loading-init')) return;

      var now = Date.now();
      var raw = sessionStorage.getItem('_bootAttempts');
      var state = { count: 0, last: 0 };
      if (raw) {
        try { state = JSON.parse(raw); } catch (_) {}
      }
      // Cooldown: si pasaron >2 min, tratá como sesión nueva
      if (now - (state.last || 0) > 120000) state = { count: 0, last: 0 };

      if (state.count >= 2) {
        // 3er fallo seguido → UI manual de recuperación
        var app = document.getElementById('app');
        if (!app) return;
        app.innerHTML =
          '<div class="loading-init" role="alert">' +
          '  <div class="loading-init-text" style="max-width:280px;line-height:1.4;text-align:center;">' +
          '    No pudimos cargar la app después de 2 intentos. Esto suele resolverse limpiando el caché.' +
          '  </div>' +
          '  <button id="_bootResetBtn" type="button" style="background:#0D47A1;color:#fff;border:none;padding:14px 24px;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px;">' +
          '    Limpiar y reintentar' +
          '  </button>' +
          '</div>';
        var btn = document.getElementById('_bootResetBtn');
        btn.addEventListener('click', function() {
          btn.textContent = 'Limpiando…';
          btn.disabled = true;
          (async function() {
            try {
              // 1. Desregistrar todos los SWs.
              if (navigator.serviceWorker) {
                var regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(function(r) { return r.unregister(); }));
              }
              // 2. Borrar todos los caches (CacheStorage).
              if (window.caches) {
                var keys = await caches.keys();
                await Promise.all(keys.map(function(k) { return caches.delete(k); }));
              }
              // 3. Limpiar localStorage corrupto pero preservar los
              //    relevamientos pendientes (cosas que el usuario cargó
              //    offline y todavía no se subieron a Sheets).
              var preservar = [
                'severo_ciudadano',
                'severo_problematica',
                'severo_sociohabitacional'
              ];
              var preservados = {};
              preservar.forEach(function(k) {
                var v = localStorage.getItem(k);
                if (v) preservados[k] = v;
              });
              localStorage.clear();
              Object.keys(preservados).forEach(function(k) {
                localStorage.setItem(k, preservados[k]);
              });
              // 4. Limpiar sessionStorage entero (incluye _bootAttempts).
              sessionStorage.clear();
            } catch (_) {}
            // 5. Navegar con _bypass=1 para que el SW (si todavía está
            //    controlando esta nav, lo cual ocurre en PWA Android
            //    aunque hayamos llamado unregister) no intercepte la
            //    request. location.replace evita que esta página entre
            //    al historial.
            location.replace(location.pathname + '?_bypass=1&_v=' + Date.now());
          })();
        });
        return;
      }

      state.count++;
      state.last = now;
      sessionStorage.setItem('_bootAttempts', JSON.stringify(state));
      console.warn('[boot] intento ' + state.count + ' fallido, recargando con cache-bust');
      location.href = location.pathname + '?_v=' + now;
    }, 10000);
  </script>

  <!--
    Google Identity Services (OAuth).
    Solo actúa si CONFIG.GOOGLE_CLIENT_ID está configurado.
    Ver: https://developers.google.com/identity/gsi/web/guides/get-google-api-clientid

    Nota SRI: este script NO lleva integrity= porque Google lo rotea sin
    avisar (no hay un hash estable que documenten). Aceptamos confiar en
    accounts.google.com como origen, igual que cualquier OAuth flow.
  -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    // ── PWA install prompt ───────────────────────────────────────────────────
    window._deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window._deferredInstallPrompt = e;
      if (window._pwaRenderInstallCard) window._pwaRenderInstallCard();
    });
    window.addEventListener('appinstalled', () => {
      window._deferredInstallPrompt = null;
      localStorage.setItem('pwa_installed', '1');
      if (window._pwaHideInstallCard) window._pwaHideInstallCard();
    });

    // ── Service Worker + update detection ───────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {

          function onNewWorkerWaiting(worker) {
            if (window._pwaShowUpdateModal) {
              window._pwaShowUpdateModal(worker);
            } else {
              // app.js aún no cargó: reintentar cuando esté disponible
              const t = setInterval(() => {
                if (window._pwaShowUpdateModal) {
                  clearInterval(t);
                  window._pwaShowUpdateModal(worker);
                }
              }, 100);
            }
          }

          if (reg.waiting && navigator.serviceWorker.controller) {
            onNewWorkerWaiting(reg.waiting);
          }
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                onNewWorkerWaiting(nw);
              }
            });
          });

          // Buscar actualizaciones al recuperar el foco y cada 5 minutos
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') reg.update();
          });
          setInterval(() => reg.update(), 5 * 60 * 1000);

        }).catch(() => {});

        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
