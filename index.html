  <meta name="application-name" content="Proyecto Severo">

  <!-- PWA -->
  <meta name="theme-color" content="#0D47A1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Proyecto Severo">
  <link rel="manifest" href="manifest.json">

  <!-- Iconos -->
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="shortcut icon" href="icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

  <!-- Open Graph (WhatsApp, Facebook, Twitter) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Proyecto Severo">
  <meta property="og:title" content="Proyecto Severo — Relevamientos">
  <meta property="og:description" content="Sistema de relevamientos ciudadanos del Proyecto Severo">
  <meta property="og:image" content="https://rundes.github.io/severo_esfimero/icons/icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:image:alt" content="Logo Proyecto Severo">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Proyecto Severo — Relevamientos">
  <meta name="twitter:description" content="Sistema de relevamientos ciudadanos del Proyecto Severo">
  <meta name="twitter:image" content="https://rundes.github.io/severo_esfimero/icons/icon-512.png">

  <!-- Leaflet CSS is only needed on the geo screen: load it off the critical path -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"></noscript>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="loading-init">Cargando…</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/gcs.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/geo.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/barrios.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <!--
    Google Identity Services (OAuth).
    Solo actúa si CONFIG.GOOGLE_CLIENT_ID está configurado.
    Ver: https://developers.google.com/identity/gsi/web/guides/get-google-api-clientid
  -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    // ── PWA install prompt ───────────────────────────────────────────────────
    window._deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window._deferredInstallPrompt = e;
      if (window._pwaRenderInstallCard) window._pwaRenderInstallCard();
    });
    window.addEventListener('appinstalled', () => {
      window._deferredInstallPrompt = null;
      localStorage.setItem('pwa_installed', '1');
      if (window._pwaHideInstallCard) window._pwaHideInstallCard();
    });

    // ── Service Worker + update detection ───────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {

          function onNewWorkerWaiting(worker) {
            if (window._pwaShowUpdateModal) window._pwaShowUpdateModal(worker);
          }

          if (reg.waiting && navigator.serviceWorker.controller) {
            onNewWorkerWaiting(reg.waiting);
          }
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                onNewWorkerWaiting(nw);
              }
            });
          });

        }).catch(() => {});

        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
